<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Ranking FIIs</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;min-width:0}
:root{--bg:#0c0e12;--card:#14171d;--card2:#1a1e26;--border:#232830;--text:#e8ecf1;--muted:#7a8290;--accent:#ffde59;--green:#00c896;--red:#ff4757;--blue:#5b7fff;--radius:10px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:var(--accent);color:#000}

.topbar{position:sticky;top:0;z-index:100;background:rgba(12,14,18,0.88);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px 0 48px;height:48px;gap:10px}
.topbar h1{font-size:17px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:7px;white-space:nowrap}
.topbar .top-right{display:flex;align-items:center;gap:8px}

.search-box{position:relative;width:160px}
.search-box input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 10px 5px 28px;color:var(--text);font-size:12px;outline:none;font-family:inherit;transition:border .25s}
.search-box input:focus{border-color:var(--accent)}
.search-box input::placeholder{color:var(--muted)}
.search-box svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:12px;height:12px;color:var(--muted);pointer-events:none}

.filters-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;border-bottom:1px solid var(--border);background:var(--card)}
.filters-wrap::-webkit-scrollbar{display:none}
.filters{display:flex;gap:4px;padding:6px 12px;max-width:1100px;margin:0 auto;align-items:center;flex-wrap:nowrap}
.filter-chip{background:transparent;border:1px solid var(--border);color:var(--muted);padding:3px 10px;border-radius:14px;font-size:10px;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap;flex-shrink:0}
.filter-chip:hover{border-color:var(--text);color:var(--text)}
.filter-chip.active{background:var(--accent);color:#000;border-color:var(--accent)}
.filter-chip:active{transform:scale(.93)}
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none}
.panel-overlay.open{display:block}
.slide-panel{position:fixed;top:0;right:-320px;width:300px;bottom:0;background:var(--card);z-index:201;transition:right .3s ease;display:flex;flex-direction:column;border-left:1px solid var(--border)}
.slide-panel.open{right:0}
.panel-header{display:flex;align-items:center;padding:12px 16px;font-size:14px;font-weight:600;color:var(--accent);border-bottom:1px solid var(--border)}
.panel-body{flex:1;overflow-y:auto;padding:12px 16px}
.pgroup{margin-bottom:16px}
.pgroup-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.prow{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.prow label{font-size:11px;color:var(--text);width:50px;flex-shrink:0}
.prow input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text);font-size:12px;outline:none;font-family:inherit}
.prow input:focus{border-color:var(--accent)}
.prow .wsel{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--accent);font-size:12px;padding:6px 8px;outline:none;cursor:pointer;font-weight:600}
.pweight{font-size:11px;color:var(--muted);min-width:30px;text-align:right}
.panel-footer{display:flex;padding:12px 16px;border-top:1px solid var(--border);gap:8px}
.filter-range-wrap{overflow-x:auto;background:var(--bg);border-bottom:1px solid var(--border)}
.filter-range-wrap::-webkit-scrollbar{display:none}
.filter-range{display:flex;gap:3px;padding:4px 8px;max-width:1100px;margin:0 auto}
.fline{display:flex;align-items:center;gap:2px}
.fline label{font-size:9px;color:var(--muted);white-space:nowrap;font-weight:600;min-width:22px}
.filter-range input{width:50px;background:var(--card);border:1px solid var(--border);border-radius:4px;padding:2px 4px;color:var(--text);font-size:10px;outline:none;font-family:inherit;transition:border .2s}
.filter-range input:focus{border-color:var(--accent)}
.filter-range input::placeholder{color:var(--muted);font-size:9px}
.wsel{background:var(--card);border:1px solid var(--border);border-radius:4px;color:var(--accent);font-size:9px;padding:2px;outline:none;cursor:pointer;font-weight:600}

.container{max-width:1100px;margin:0 auto;padding:6px 12px 40px}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 0;color:var(--muted);gap:12px}
.loading .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.header-row{display:flex;align-items:center;padding:6px 10px;margin-bottom:2px;font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border);position:sticky;top:94px;z-index:50;background:var(--bg)}
.header-row .h{display:flex;align-items:center;gap:4px;cursor:pointer;transition:color .2s;user-select:none;padding:4px 0}
.header-row .h:hover{color:var(--text)}
.header-row .h.sorted{color:var(--accent)}
.header-row .h .arrow{font-size:7px;opacity:0;transition:opacity .2s}
.header-row .h.sorted .arrow{opacity:1}
.h-rank{width:38px;flex-shrink:0;justify-content:center}
.h-tipo{width:60px;flex-shrink:0}
.h-seg{flex:1;min-width:80px}
.h-ticker{width:80px;flex-shrink:0}
.h-liq{width:90px;flex-shrink:0;justify-content:flex-end}
.h-cot{width:65px;flex-shrink:0;justify-content:flex-end}
.h-var{width:70px;flex-shrink:0;justify-content:flex-end}
.h-pvp{width:70px;flex-shrink:0;justify-content:flex-end}
.h-dy{width:65px;flex-shrink:0;justify-content:flex-end}
.h-nota-liq{width:55px;flex-shrink:0;justify-content:flex-end}
.cell-nota-liq{width:55px;flex-shrink:0;justify-content:flex-end;font-size:11px;font-weight:600;font-variant-numeric:tabular-nums}
.h-nota-pvp,.cell-nota-pvp,.h-nota-dy,.cell-nota-dy{width:50px;flex-shrink:0;justify-content:flex-end;font-size:11px;font-weight:600;font-variant-numeric:tabular-nums}

.row-card{display:flex;align-items:center;padding:8px 10px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:3px;animation:rowIn .35s ease-out both;transition:all .3s cubic-bezier(.34,1.56,.64,1);cursor:default}
.row-card:hover{border-color:rgba(255,255,255,0.12);background:var(--card2)}
@keyframes rowIn{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}

.cell{display:flex;align-items:center;gap:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cell-rank{width:38px;flex-shrink:0;justify-content:center;font-size:10px;font-weight:600;color:var(--muted)}
.top3 .cell-rank{font-size:11px}
.top3:nth-child(1) .cell-rank{color:#ffd700}
.top3:nth-child(2) .cell-rank{color:#c0c0c0}
.top3:nth-child(3) .cell-rank{color:#cd7f32}
.cell-tipo{width:60px;flex-shrink:0}
.tipo-badge{font-size:8px;padding:2px 5px;border-radius:3px;font-weight:600;line-height:14px;white-space:nowrap}
.tipo-Tijolo{background:rgba(91,127,255,.15);color:var(--blue)}
.tipo-Papel{background:rgba(0,200,150,.15);color:var(--green)}
.tipo-FoF{background:rgba(255,159,67,.15);color:var(--orange)}
.tipo-Híbrido{background:rgba(255,222,89,.15);color:var(--accent)}
.tipo-Fiagro{background:rgba(46,196,182,.15);color:#2ec4b6}
.tipo-FI-Infra{background:rgba(91,127,255,.12);color:#7b9cff}
.tipo-FIP-IE{background:rgba(200,130,255,.15);color:#c882ff}
.cell-seg{flex:1;min-width:80px;font-size:10px;color:var(--muted)}
.cell-ticker{width:80px;flex-shrink:0;font-size:13px;font-weight:600;color:var(--accent)}
.cell-liq{width:90px;flex-shrink:0;justify-content:flex-end;font-size:10px;color:var(--text);font-weight:500}
.cell-cot{width:65px;flex-shrink:0;justify-content:flex-end;font-size:11px;font-weight:600;font-variant-numeric:tabular-nums}
.cell-var{width:70px;flex-shrink:0;justify-content:flex-end;font-size:11px;font-weight:700;font-variant-numeric:tabular-nums}
.cell-var .var-up{color:var(--green)}
.cell-var .var-down{color:var(--red)}
.cell-graf{width:74px;flex-shrink:0;justify-content:center}
.cell-atr{width:60px;flex-shrink:0;justify-content:center}
.atr-bar{width:40px;height:10px;background:rgba(255,255,255,0.06);border-radius:5px;overflow:hidden}
.atr-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.34,1.56,.64,1)}
.cell-pvp{width:70px;flex-shrink:0;justify-content:flex-end;font-size:11px;font-weight:600;font-variant-numeric:tabular-nums}
.cell-pvp .val{color:var(--text)}
.cell-dy{width:65px;flex-shrink:0;justify-content:flex-end;font-size:11px;font-weight:600;font-variant-numeric:tabular-nums}
.cell-nota-pvp,.cell-nota-dy{width:50px;flex-shrink:0;justify-content:flex-end;font-size:11px;font-weight:600;font-variant-numeric:tabular-nums}
.cell-nota{width:50px;flex-shrink:0;justify-content:flex-end;font-size:11px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--accent)}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state i{font-size:36px;opacity:.3;margin-bottom:10px}

@media(max-width:768px){
.topbar{padding:0 12px 0 48px;height:44px;gap:6px}
.topbar h1{font-size:15px;gap:4px}
.search-box{width:120px}
.search-box input{font-size:11px;padding:4px 8px 4px 24px}
.search-box svg{width:10px;height:10px;left:6px}
.filters{padding:4px 8px;gap:3px}
.filter-range{gap:2px;padding:3px 6px}
.filter-range input{width:44px;font-size:9px;padding:2px 3px}
.fline label{min-width:20px;font-size:8px}
.container{padding:4px 8px 30px}
.header-row{padding:4px 8px;font-size:8px;top:86px}
.row-card{padding:6px 8px;gap:0}
.h-rank,.cell-rank{width:30px}
.h-tipo,.cell-tipo{width:48px}
.h-ticker,.cell-ticker{width:65px;font-size:12px}
.h-liq,.cell-liq{width:70px;font-size:10px}
.h-cot,.cell-cot{width:55px;font-size:10px}
.h-var,.cell-var{width:58px;font-size:10px}
.h-graf,.cell-graf{width:60px}
.h-atr,.cell-atr{width:50px}
.h-pvp,.cell-pvp{width:50px;font-size:10px}
.h-dy,.cell-dy{width:55px;font-size:10px}
.h-nota-liq,.cell-nota-liq{width:55px;font-size:10px}
.h-nota-pvp,.cell-nota-pvp,.h-nota-dy,.cell-nota-dy{width:45px;font-size:10px}
.h-nota,.cell-nota{width:42px;font-size:10px}
.cell-seg{font-size:10px}
.tipo-badge{font-size:7px;padding:1px 4px}
.atr-bar{width:32px;height:8px}
}
@media(max-width:480px){
.h-rank,.cell-rank{display:none}
.h-tipo,.cell-tipo{width:40px}
.h-ticker,.cell-ticker{width:55px;font-size:11px}
.h-cot,.cell-cot{width:50px;font-size:10px}
.h-var,.cell-var{width:52px;font-size:10px}
.h-graf,.cell-graf{display:none}
.h-atr,.cell-atr{display:none}
.h-liq,.cell-liq{width:60px;font-size:9px}
.h-pvp,.cell-pvp{width:45px;font-size:10px}
.h-dy,.cell-dy{width:45px;font-size:10px}
.h-nota-liq,.cell-nota-liq{width:45px;font-size:10px}
.h-nota-pvp,.cell-nota-pvp,.h-nota-dy,.cell-nota-dy{width:40px;font-size:10px}
.h-nota,.cell-nota{width:38px;font-size:10px}
.cell-seg{font-size:9px}
}
</style>
</head>
<body>

<div class="topbar">
  <h1><i class="fas fa-trophy" style="font-size:14px"></i> Ranking <small>FIIs</small></h1>
  <div class="top-right">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" placeholder="Buscar ticker..." oninput="onSearch()" autocomplete="off" list="tickerList">
      <datalist id="tickerList"></datalist>
    </div>
    <button id="gearBtn" onclick="togglePanel()" style="background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px" title="Filtros"><i class="fas fa-cog"></i></button>
  </div>
</div>

<div class="filters-wrap">
  <div class="filters" id="filters">
    <button class="filter-chip active" data-tipo="all" onclick="toggleFiltro(this)">Todos</button>
    <button class="filter-chip active" data-tipo="Tijolo" onclick="toggleFiltro(this)">Tijolo</button>
    <button class="filter-chip active" data-tipo="Papel" onclick="toggleFiltro(this)">Papel</button>
    <button class="filter-chip active" data-tipo="FoF" onclick="toggleFiltro(this)">FoF</button>
    <button class="filter-chip active" data-tipo="Híbrido" onclick="toggleFiltro(this)">Híbrido</button>
    <button class="filter-chip active" data-tipo="Fiagro" onclick="toggleFiltro(this)">Fiagro</button>
    <button class="filter-chip active" data-tipo="FI-Infra" onclick="toggleFiltro(this)">FI-Infra</button>
  </div>
</div>
<div id="panelOverlay" class="panel-overlay" onclick="togglePanel()"></div>
<div id="panel" class="slide-panel">
  <div class="panel-header">Filtros <button onclick="togglePanel()" style="background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;margin-left:auto"><i class="fas fa-times"></i></button></div>
  <div class="panel-body">
    <div class="pgroup"><div class="pgroup-title">Liquidez</div>
      <div class="prow"><label>Mín</label><input type="text" id="liqMin" inputmode="numeric" placeholder="0" oninput="fmtLiqInput(this);render()"></div>
      <div class="prow"><label>Máx</label><input type="text" id="liqMax" inputmode="numeric" placeholder="—" oninput="fmtLiqInput(this);render()"></div>
      <div class="prow"><label>Peso</label><select id="wLiq" onchange="render()" class="wsel"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5" selected>5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option></select><span class="pweight">× <span id="wLiqLabel">0.5</span></span></div>
    </div>
    <div class="pgroup"><div class="pgroup-title">P/VP</div>
      <div class="prow"><label>Mín</label><input type="number" id="pvpMin" placeholder="0" oninput="render()" step="0.01"></div>
      <div class="prow"><label>Máx</label><input type="number" id="pvpMax" placeholder="—" oninput="render()" step="0.01"></div>
      <div class="prow"><label>Peso</label><select id="wPvp" onchange="render()" class="wsel"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5" selected>5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option></select><span class="pweight">× <span id="wPvpLabel">0.5</span></span></div>
    </div>
    <div class="pgroup"><div class="pgroup-title">DY</div>
      <div class="prow"><label>Mín %</label><input type="number" id="dyMin" placeholder="0" oninput="render()" step="0.1"></div>
      <div class="prow"><label>Máx %</label><input type="number" id="dyMax" placeholder="—" oninput="render()" step="0.1"></div>
      <div class="prow"><label>Peso</label><select id="wDy" onchange="render()" class="wsel"><option value="0">0</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5" selected>5</option><option value="6">6</option><option value="7">7</option><option value="8">8</option><option value="9">9</option><option value="10">10</option></select><span class="pweight">× <span id="wDyLabel">0.5</span></span></div>
    </div>
  </div>
  <div class="panel-footer"><button class="filter-chip" onclick="aplicarFiltros({tipos:{},liqMin:'',liqMax:'',wLiq:'5',pvpMin:'',pvpMax:'',wPvp:'5',dyMin:'',dyMax:'',wDy:'5'})" style="font-size:10px">Limpar</button><span id="panelSaveArea" style="margin-left:auto;font-size:10px;color:var(--muted)">⋯</span></div>
</div>

<div class="container">
  <div id="loading" class="loading"><div class="spinner"></div><span>Carregando...</span></div>
  <div id="header" class="header-row" style="display:none">
    <div class="h h-rank" onclick="setSort('rank')"># <span class="arrow">▼</span></div>
    <div class="h h-ticker" onclick="setSort('ticker')">Ticker <span class="arrow">▼</span></div>
    <div class="h h-tipo" style="display:none" onclick="setSort('tipo')">Tipo <span class="arrow">▼</span></div>
    <div class="h h-seg" style="display:none" onclick="setSort('segmento')">Segmento <span class="arrow">▼</span></div>
    <div class="h h-cot" onclick="setSort('cotacao')">Cotação <span class="arrow">▼</span></div>
    <div class="h h-var" onclick="setSort('variacao')">Variação <span class="arrow">▼</span></div>
    <div class="h h-graf" style="justify-content:center;width:74px">Gráfico</div>
    <div class="h h-atr" onclick="setSort('atratividade')" style="width:60px;justify-content:center">Atrat. <span class="arrow">▼</span></div>
    <div class="h h-liq" onclick="setSort('liquidez')">Liq <span class="arrow">▼</span></div>
    <div class="h h-nota-liq" onclick="setSort('nota_liq')">N.Liq <span class="arrow">▼</span></div>
    <div class="h h-pvp" onclick="setSort('pvp')">P/VP <span class="arrow">▼</span></div>
    <div class="h h-nota-pvp" onclick="setSort('nota_pvp')">N.PVP <span class="arrow">▼</span></div>
    <div class="h h-dy" onclick="setSort('dy')">DY <span class="arrow">▼</span></div>
    <div class="h h-nota-dy" onclick="setSort('nota_dy')">N.DY <span class="arrow">▼</span></div>
    <div class="h h-nota" onclick="setSort('nota')" style="width:50px;justify-content:flex-end">Nota <span class="arrow">▼</span></div>
  </div>
  <div id="feed"></div>
</div>

<script>
const REST='https://oaqmnaekrpukwmrxjtud.supabase.co/rest/v1'
const H={apikey:'sb_publishable_ekx47MbcOg-C1uoAPJnKWg_c9t9ndQR',Authorization:'Bearer sb_publishable_ekx47MbcOg-C1uoAPJnKWg_c9t9ndQR'}

let allData=[],sortKey='liquidez',sortDesc=true,searchTerm=''
let activeTipos={}
document.querySelectorAll('.filter-chip[data-tipo]').forEach(el=>{activeTipos[el.dataset.tipo]=true})

function fmtLiq(v){
  if(v==null||isNaN(v)||v===0)return'—'
  if(v>=1e9)return(v/1e9).toFixed(1)+' bi'
  if(v>=1e6)return(v/1e6).toFixed(1)+' mi'
  if(v>=1e3)return(v/1e3).toFixed(0)+' mil'
  return v.toFixed(0)
}
function fmtNum(v){
  if(v==null||isNaN(v))return'—'
  return v.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})
}
function fmtPct(v){
  if(v==null||isNaN(v))return'—'
  return (v*100).toFixed(2)+'%'
}
function fmtLiqInput(el){
  let v=el.value.replace(/\D/g,'')
  if(v)el.value=parseInt(v,10).toLocaleString('pt-BR')
  else el.value=''
}
function parseLiqVal(s){
  if(!s)return null
  let n=+(s.replace(/\./g,''))
  return isNaN(n)?null:n
}



function togglePanel(){
  document.getElementById('panel').classList.toggle('open')
  document.getElementById('panelOverlay').classList.toggle('open')
}
['wLiq','wPvp','wDy'].forEach(id=>{
  let el=document.getElementById(id)
  el.onchange=function(){document.getElementById(id+'Label').textContent=(+this.value/10).toFixed(1);render()}
})

async function load(){
  try{
    let raw=await fetch(REST+'/Ranking_FIIs?select=ticker,tipo,segmento,cotacao,variacao,liquidez_media_30d,p_vp,dividend_yield_12m,min_52s,max_52s,historico_cotacoes&limit=1000',{headers:H})
    if(!raw.ok)throw new Error(raw.status)
    allData=await raw.json()
    populateDatalist()
    // Auth check + setup
    let loggedIn = false
    try {
      const sess = await getSession()
      loggedIn = !!sess?.data?.session
      if (loggedIn) {
        const setups = await listarSetups()
        if (setups.length > 0) aplicarFiltros(setups[0].filtros)
      }
    } catch(e) {}
    if (!loggedIn) {
      // Aplicar filtros default
      try {
        if (!localStorage.getItem('rankingSetup')) {
          aplicarFiltros({
            tipos: {},
            liqMin: '1.000.000', liqMax: '20.000.000', wLiq: '10',
            pvpMin: '0.5', pvpMax: '1.5', wPvp: '10',
            dyMin: '8', dyMax: '', wDy: '10'
          })
        } else {
          const saved = localStorage.getItem('rankingSetup')
          const f = JSON.parse(saved)
          if (f && f.tipos) aplicarFiltros(f)
        }
      } catch(e) {}
    }
    // Atualizar botao do painel conforme auth
    const area = document.getElementById('panelSaveArea')
    if (loggedIn) {
      area.innerHTML = '<button class="filter-chip active" onclick="salvarSetupAtual()" style="font-size:10px">Salvar</button><button class="filter-chip" onclick="togglePanel()" style="font-size:10px">Fechar</button>'
    } else {
      area.innerHTML = '<a href="login.html" style="color:var(--accent);text-decoration:none;font-weight:600">Logar para salvar</a><button class="filter-chip" onclick="togglePanel()" style="font-size:10px;margin-left:6px">Fechar</button>'
    }
    document.getElementById('loading').style.display='none'
    document.getElementById('header').style.display='flex'
    render()
  }catch(e){
    document.getElementById('loading').innerHTML='<i class="fas fa-exclamation-triangle" style="font-size:28px;opacity:.4;margin-bottom:8px"></i><br>Erro: '+e.message
  }
}

function populateDatalist(){
  let tickers=[...new Set(allData.map(d=>d.ticker).filter(Boolean))].sort()
  document.getElementById('tickerList').innerHTML=tickers.map(t=>'<option value="'+t+'">').join('')
}

function toggleFiltro(el){
  let k=el.dataset.tipo
  if(k==='all'){
    let allOn=Object.keys(activeTipos).every(t=>activeTipos[t])
    let newVal=!allOn
    document.querySelectorAll('.filter-chip[data-tipo]').forEach(e=>{
      if(e.dataset.tipo!=='all'){e.classList.toggle('active',newVal);activeTipos[e.dataset.tipo]=newVal}
    })
    el.classList.toggle('active',newVal)
  }else{
    activeTipos[k]=!activeTipos[k]
    el.classList.toggle('active')
    let anyOn=Object.values(activeTipos).some(v=>v)
    if(!anyOn){activeTipos[k]=true;el.classList.add('active')}
    let allOn=Object.keys(activeTipos).every(t=>activeTipos[t])
    document.querySelector('.filter-chip[data-tipo="all"]').classList.toggle('active',allOn)
  }
  render()
}

function onSearch(){
  searchTerm=document.getElementById('search').value.toUpperCase().trim()
  render()
}

function setSort(key){
  if(sortKey===key){sortDesc=!sortDesc}
  else{sortKey=key;sortDesc=key==='tipo'||key==='segmento'||key==='ticker'?false:true}
  document.querySelectorAll('.header-row .h').forEach(el=>el.classList.remove('sorted'))
  let map={rank:'h-rank',ticker:'h-ticker',tipo:'h-tipo',segmento:'h-seg',cotacao:'h-cot',variacao:'h-var',atratividade:'h-atr',liquidez:'h-liq',nota_liq:'h-nota-liq',pvp:'h-pvp',nota_pvp:'h-nota-pvp',dy:'h-dy',nota_dy:'h-nota-dy',nota:'h-nota'}
  let el=document.querySelector('.'+map[key]);if(el)el.classList.add('sorted')
  render()
}

function render(){
  let items=[...allData]
  let fk=Object.keys(activeTipos).filter(k=>activeTipos[k])
  if(fk.length<Object.keys(activeTipos).length)items=items.filter(it=>fk.includes(it.tipo))
  if(searchTerm)items=items.filter(it=>it.ticker.toUpperCase().includes(searchTerm))
  function fv(id,raw){let e=document.getElementById(id);if(!e||!e.value)return null;let v=raw?e.value:+e.value;return v||v===0?v:null}
  let flMin=fv('liqMin',1),flMax=fv('liqMax',1),fpMin=fv('pvpMin'),fpMax=fv('pvpMax'),fdMin=fv('dyMin'),fdMax=fv('dyMax')
  if(flMin!=null||flMax!=null)items=items.filter(it=>{let v=+it.liquidez_media_30d;let mn=parseLiqVal(flMin),mx=parseLiqVal(flMax);return(mn==null||v>=mn)&&(mx==null||v<=mx)})
  if(fpMin!=null||fpMax!=null)items=items.filter(it=>{let v=it.p_vp;return v!=null&&(fpMin==null||v>=fpMin)&&(fpMax==null||v<=fpMax)})
  if(fdMin!=null||fdMax!=null)items=items.filter(it=>{let v=it.dividend_yield_12m;return v!=null&&(fdMin==null||v>=fdMin/100)&&(fdMax==null||v<=fdMax/100)})

  let mnLiq=Infinity,mxLiq=-Infinity,mnPvp=Infinity,mxPvp=-Infinity,mnDy=Infinity,mxDy=-Infinity
  for(let z=0;z<items.length;z++){
    let it=items[z]
    let lv=+it.liquidez_media_30d;if(lv>0){if(lv<mnLiq)mnLiq=lv;if(lv>mxLiq)mxLiq=lv}
    let pv=it.p_vp;if(pv!=null&&pv>0){if(pv<mnPvp)mnPvp=pv;if(pv>mxPvp)mxPvp=pv}
    let dv=it.dividend_yield_12m;if(dv!=null&&dv>0){if(dv<mnDy)mnDy=dv;if(dv>mxDy)mxDy=dv}
  }
  let rgLiq=mxLiq>mnLiq?mxLiq-mnLiq:1,rgPvp=mxPvp>mnPvp?mxPvp-mnPvp:1,rgDy=mxDy>mnDy?mxDy-mnDy:1
  let wl=(+document.getElementById('wLiq').value||0)/10,wp=(+document.getElementById('wPvp').value||0)/10,wd=(+document.getElementById('wDy').value||0)/10

  items.sort((a,b)=>{
    let va,vb
    if(sortKey==='rank')return sortDesc?1:-1
    if(sortKey==='tipo'){va=a.tipo||'';vb=b.tipo||'';return sortDesc?vb.localeCompare(va):va.localeCompare(vb)}
    if(sortKey==='segmento'){va=a.segmento||'';vb=b.segmento||'';return sortDesc?vb.localeCompare(va):va.localeCompare(vb)}
    if(sortKey==='ticker'){va=a.ticker||'';vb=b.ticker||'';return sortDesc?vb.localeCompare(va):va.localeCompare(vb)}
    if(sortKey==='liquidez'){va=+a.liquidez_media_30d||0;vb=+b.liquidez_media_30d||0;return sortDesc?vb-va:va-vb}
    if(sortKey==='nota_liq'){va=+a.liquidez_media_30d>0?((+a.liquidez_media_30d-mnLiq)/rgLiq)*wl:0;vb=+b.liquidez_media_30d>0?((+b.liquidez_media_30d-mnLiq)/rgLiq)*wl:0;return sortDesc?vb-va:va-vb}
    if(sortKey==='nota_pvp'){let apv=a.p_vp,bpv=b.p_vp;va=apv!=null&&apv>0?(1-(apv-mnPvp)/rgPvp)*wp:0;vb=bpv!=null&&bpv>0?(1-(bpv-mnPvp)/rgPvp)*wp:0;return sortDesc?vb-va:va-vb}
    if(sortKey==='nota_dy'){let adv=a.dividend_yield_12m,bdv=b.dividend_yield_12m;va=adv!=null&&adv>0?((adv-mnDy)/rgDy)*wd:0;vb=bdv!=null&&bdv>0?((bdv-mnDy)/rgDy)*wd:0;return sortDesc?vb-va:va-vb}
    if(sortKey==='nota'){
      let al=+a.liquidez_media_30d>0?(+a.liquidez_media_30d-mnLiq)/rgLiq:0,ap=a.p_vp!=null&&a.p_vp>0?1-(a.p_vp-mnPvp)/rgPvp:0,ad=a.dividend_yield_12m!=null&&a.dividend_yield_12m>0?(a.dividend_yield_12m-mnDy)/rgDy:0
      let bl=+b.liquidez_media_30d>0?(+b.liquidez_media_30d-mnLiq)/rgLiq:0,bp=b.p_vp!=null&&b.p_vp>0?1-(b.p_vp-mnPvp)/rgPvp:0,bd=b.dividend_yield_12m!=null&&b.dividend_yield_12m>0?(b.dividend_yield_12m-mnDy)/rgDy:0
      let na=al*wl+ap*wp+ad*wd,nb=bl*wl+bp*wp+bd*wd
      return sortDesc?nb-na:na-nb
    }
    if(sortKey==='cotacao'){va=+a.cotacao||0;vb=+b.cotacao||0;return sortDesc?vb-va:va-vb}
    if(sortKey==='variacao'){va=+a.variacao||0;vb=+b.variacao||0;return sortDesc?vb-va:va-vb}
    if(sortKey==='atratividade'){
      let aa=a.min_52s!=null&&a.max_52s!=null&&a.max_52s>a.min_52s&&a.cotacao!=null?1-(a.cotacao-a.min_52s)/(a.max_52s-a.min_52s):-1
      let bb=b.min_52s!=null&&b.max_52s!=null&&b.max_52s>b.min_52s&&b.cotacao!=null?1-(b.cotacao-b.min_52s)/(b.max_52s-b.min_52s):-1
      return sortDesc?bb-aa:aa-bb
    }
    if(sortKey==='pvp'){va=a.p_vp!=null?a.p_vp:-999;vb=b.p_vp!=null?b.p_vp:-999;return sortDesc?vb-va:va-vb}
    if(sortKey==='dy'){va=a.dividend_yield_12m!=null?a.dividend_yield_12m:-999;vb=b.dividend_yield_12m!=null?b.dividend_yield_12m:-999;return sortDesc?vb-va:va-vb}
    return 0
  })

  if(!items.length){
    document.getElementById('feed').innerHTML='<div class="empty-state"><i class="fas fa-inbox"></i><br>Nenhum fundo encontrado.</div>'
    return
  }

  let html=''
  for(let i=0;i<items.length;i++){
    let it=items[i],pos=i+1
    let top3=pos<=3?' top3':''
    html+='<div class="row-card'+top3+'" style="animation-delay:'+(i*0.012)+'s">'
    html+='<div class="cell cell-rank">'+pos+'</div>'
    html+='<div class="cell cell-ticker">'+(it.ticker||'')+'</div>'
    html+='<div class="cell cell-tipo" style="display:none"><span class="tipo-badge tipo-'+(it.tipo||'').replace(/ /g,'')+'">'+((it.tipo||'')==='FI-Infra'?'FI':it.tipo||'')+'</span></div>'
    html+='<div class="cell cell-seg" style="display:none">'+(it.segmento||'')+'</div>'
    html+='<div class="cell cell-cot">'+(it.cotacao!=null?fmtNum(it.cotacao):'—')+'</div>'
    html+='<div class="cell cell-var"><span class="'+(it.variacao>=0?'var-up':'var-down')+'">'+(it.variacao!=null?(it.variacao>=0?'+':'')+fmtNum(it.variacao)+'%':'—')+'</span></div>'
    let vals=it.historico_cotacoes;if(typeof vals==='string')try{vals=JSON.parse(vals)}catch(e){vals=null};if(!Array.isArray(vals))vals=null
    let min52=it.min_52s!=null?+it.min_52s:null
    let max52=it.max_52s!=null?+it.max_52s:null
    let atratividade=null
    if(min52!=null&&max52!=null&&max52>min52&&it.cotacao!=null){
      atratividade=1-(it.cotacao-min52)/(max52-min52)
    }
    if(vals&&vals.length>1){
      let n=vals.length,h=26,w=70,mn=+vals[0],mx=+vals[0]
      for(let j=1;j<n;j++){let v=+vals[j];if(v<mn)mn=v;if(v>mx)mx=v}
      let rg=mx-mn||1,cor=+vals[n-1]>=+vals[0]?'#00c896':'#ff4757'
      let d='M0,'+((h-1-(+vals[0]-mn)/rg*(h-2))).toFixed(1)
      for(let j=1;j<n;j++)d+=' L'+(j/(n-1)*w).toFixed(1)+','+((h-1-(+vals[j]-mn)/rg*(h-2))).toFixed(1)
      html+='<div class="cell cell-graf"><svg width="70" height="26" viewBox="0 0 70 26"><rect width="70" height="26" fill="var(--card)" rx="3"/><path fill="none" stroke="'+cor+'" stroke-width="1" d="'+d+'"/></svg></div>'
    }else{
      html+='<div class="cell cell-graf" style="color:var(--muted);font-size:9px">—</div>'
    }
    html+='<div class="cell cell-atr"><div class="atr-bar"><div class="atr-fill" style="width:'+((atratividade!=null?Math.round(atratividade*100):0))+'%;background:'+(atratividade!=null?(atratividade>0.5?'var(--green)':'var(--red)'):'var(--muted)')+'"></div></div></div>'
    html+='<div class="cell cell-liq">'+fmtLiq(it.liquidez_media_30d)+'</div>'
    let liqv=+it.liquidez_media_30d,nota_liq=liqv>0?((liqv-mnLiq)/rgLiq)*wl:0
    html+='<div class="cell cell-nota-liq">'+nota_liq.toFixed(3)+'</div>'
    html+='<div class="cell cell-pvp"><span class="val">'+fmtNum(it.p_vp)+'</span></div>'
    let sp=it.p_vp!=null&&it.p_vp>0?1-(it.p_vp-mnPvp)/rgPvp:0
    html+='<div class="cell cell-nota-pvp">'+(sp*wp).toFixed(3)+'</div>'
    html+='<div class="cell cell-dy"><span class="val">'+fmtPct(it.dividend_yield_12m)+'</span></div>'
    let sd=it.dividend_yield_12m!=null&&it.dividend_yield_12m>0?(it.dividend_yield_12m-mnDy)/rgDy:0
    html+='<div class="cell cell-nota-dy">'+(sd*wd).toFixed(3)+'</div>'
    let sl=+it.liquidez_media_30d>0?(+it.liquidez_media_30d-mnLiq)/rgLiq:0
    let nota=sl*wl+sp*wp+sd*wd
    html+='<div class="cell cell-nota">'+nota.toFixed(3)+'</div>'
    html+='</div>'
  }
  document.getElementById('feed').innerHTML=html
}

function aplicarFiltros(f) {
  function s(id, val) {
    const e = document.getElementById(id)
    if (!e) return
    if (id === 'liqMin' || id === 'liqMax') {
      const raw = (val || '').replace(/\D/g, '')
      e.value = raw ? parseInt(raw, 10).toLocaleString('pt-BR') : ''
    } else {
      e.value = val || ''
    }
  }
  document.querySelectorAll('.filter-chip[data-tipo]').forEach(el => {
    if (el.dataset.tipo === 'all') return
    const ativo = f.tipos && f.tipos[el.dataset.tipo]
    el.classList.toggle('active', ativo !== false)
    if (f.tipos) activeTipos[el.dataset.tipo] = ativo !== false
  })
  const allOn = Object.keys(activeTipos).every(t => activeTipos[t])
  document.querySelector('.filter-chip[data-tipo="all"]').classList.toggle('active', allOn)
  s('liqMin', f.liqMin); s('liqMax', f.liqMax); s('wLiq', f.wLiq)
  s('pvpMin', f.pvpMin); s('pvpMax', f.pvpMax); s('wPvp', f.wPvp)
  s('dyMin', f.dyMin); s('dyMax', f.dyMax); s('wDy', f.wDy)
  ;['wLiq','wPvp','wDy'].forEach(id => {
    const el = document.getElementById(id)
    const lbl = document.getElementById(id + 'Label')
    if (el && lbl) lbl.textContent = (+el.value / 10).toFixed(1)
  })
  render()
}

async function salvarSetupAtual() {
  try {
    const sess = await getSession()
    if (!sess?.data?.session) { alert('Faça login primeiro'); return }
  } catch(e) { alert('Faça login primeiro'); return }
  const filtros = (() => {
    const tipos = {}
    document.querySelectorAll('.filter-chip[data-tipo]').forEach(el => {
      if (el.dataset.tipo !== 'all') tipos[el.dataset.tipo] = el.classList.contains('active')
    })
    return {
      tipos,
      liqMin: document.getElementById('liqMin').value,
      liqMax: document.getElementById('liqMax').value,
      wLiq: document.getElementById('wLiq').value,
      pvpMin: document.getElementById('pvpMin').value,
      pvpMax: document.getElementById('pvpMax').value,
      wPvp: document.getElementById('wPvp').value,
      dyMin: document.getElementById('dyMin').value,
      dyMax: document.getElementById('dyMax').value,
      wDy: document.getElementById('wDy').value,
    }
  })()
  try {
    const setups = await listarSetups()
    if (setups.length > 0) {
      await atualizarSetup(setups[0].id, { nome: 'Meu Setup', filtros })
    } else {
      await salvarSetup('Meu Setup', filtros)
    }
    const area = document.getElementById('panelSaveArea')
    area.innerHTML = '<span style="color:var(--green);font-size:10px">✓</span><button class="filter-chip active" onclick="salvarSetupAtual()" style="font-size:10px;margin-left:4px">Salvar</button><button class="filter-chip" onclick="togglePanel()" style="font-size:10px;margin-left:4px">Fechar</button>'
  } catch(e) { alert('Erro ao salvar: ' + e.message) }
}

load()
