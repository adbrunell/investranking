  return el('div',{className:['border border-[#2a2e36] rounded-xl overflow-hidden transition-all',open?'border-[#14b8a6]/30':'hover:border-[#8a909a]/30'].join(' ')},
    el('button',{
      onClick:onToggle,
      className:'w-full flex items-center justify-between gap-3 px-5 py-4 text-left text-sm font-medium text-[#e8ecf1] bg-[#1a1d24] hover:bg-[#1f232b] transition-colors',
      'aria-expanded':open,
    },
      el('span',{className:'flex-1'},q),
      el(Icons.ChevronDown,{className:['w-4 h-4 text-[#8a909a] transition-transform duration-300',open?'rotate-180':''].join(' ')}),
    ),
    el('div',{className:['faq-answer',open?'faq-open':''].join(' ')},
      el('div',{className:'faq-answer-inner'},
        el('div',{className:'px-5 pb-4 text-sm text-[#8a909a] leading-relaxed bg-[#1a1d24]'},a)
      )
    )
  )
}

function FAQSection() {
  const [openIdx,setOpenIdx]=useState(null)
  return el('section',{className:'py-16 md:py-20 px-5 bg-[#111318] border-t border-[#2a2e36]'},
    el('div',{className:'max-w-3xl mx-auto'},
      el('h2',{className:'text-2xl md:text-3xl font-bold text-center text-[#e8ecf1] mb-10'},'Perguntas Frequentes'),
      el('div',{className:'space-y-3'},
        FAQS.map((item,i)=>
          el(FAQ,{key:i,q:item.q,a:item.a,open:openIdx===i,onToggle:()=>setOpenIdx(openIdx===i?null:i)})
        )
      ),
      el('script',{type:'application/ld+json',dangerouslySetInnerHTML:{__html:JSON.stringify({
        '@context':'https://schema.org',
        '@type':'FAQPage',
        mainEntity:FAQS.map(item=>({
          '@type':'Question',
          name:item.q,
          acceptedAnswer:{'@type':'Answer','text':item.a}
        }))
      })}})
    )
  )
}
