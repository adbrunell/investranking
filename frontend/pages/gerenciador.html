<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invest Ranking — Gerenciador</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#111318;--surface:#1a1d24;--surface2:#1f232b;--border:#2a2e36;
  --text:#e2e5e9;--text-muted:#8a909a;--heading:#eef0f3;
  --accent:#ffde59;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;--blue:#60a5fa;
  --radius:8px;--font:'Segoe UI',system-ui,-apple-system,sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;padding:24px;min-height:100vh}
h1{font-size:20px;color:var(--heading);margin-bottom:2px;font-weight:600}
.sub{color:var(--text-muted);font-size:13px;margin-bottom:20px}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.stat-val{font-size:26px;font-weight:700;line-height:1.2}
.stat-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.stat.total .stat-val{color:var(--text)}
.stat.ok .stat-val{color:var(--green)}
.stat.error .stat-val{color:var(--red)}
.stat.skip .stat-val{color:var(--text-muted)}

.controls{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.tag{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:var(--radius);border:none;font-size:11px;cursor:default;font-family:inherit;background:var(--border);color:var(--text-muted)}
#statusText{font-size:12px;color:var(--text-muted)}

table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
thead{background:var(--surface2)}
th{padding:10px 12px;text-align:left;font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;font-weight:600;border-bottom:1px solid var(--border)}
td{padding:8px 12px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}

.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle}
.dot.ok{background:var(--green)}
.dot.erro{background:var(--red)}
.dot.skip{background:#555}
.dot.pend{background:var(--accent)}

.col-status{width:16px}
.col-name{font-weight:600;color:var(--heading)}
.col-rec{color:var(--text)}
.col-last{color:var(--text-muted);font-size:12px}
.col-dur{color:var(--text-muted);font-size:12px}

.log-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.log-box h3{font-size:13px;color:var(--heading);font-weight:600;margin-bottom:10px}

.exec-list{display:flex;flex-direction:column;gap:6px}
.exec-group{margin-bottom:4px}
.exec-date{font-size:12px;color:var(--heading);font-weight:600;margin-bottom:4px;padding:4px 0}
.exec-row{display:flex;gap:6px;padding:3px 0;font-size:12px;font-family:'Cascadia Code','Consolas',monospace;border-bottom:1px solid rgba(255,255,255,.02)}
.exec-time{color:var(--text-muted);flex-shrink:0;min-width:40px}
.exec-cell{display:flex;align-items:center;gap:4px;min-width:70px}
.exec-label{color:var(--text-muted);font-size:10px}

.empty{color:var(--text-muted);text-align:center;padding:40px;font-size:13px}

@media(max-width:640px){
  body{padding:12px}
  .stats{grid-template-columns:repeat(2,1fr)}
  table{font-size:12px}
  th,td{padding:6px 8px}
}
</style>
</head>
<body>

<h1>Gerenciador de Atualiza&ccedil;&otilde;es</h1>
<p class="sub" id="statusBar">Carregando status da base de dados...</p>

<div class="stats">
  <div class="stat total"><div class="stat-val" id="statTotal">-</div><div class="stat-label">Total de scripts</div></div>
  <div class="stat ok"><div class="stat-val" id="statOk">-</div><div class="stat-label">&Uacute;ltima: OK</div></div>
  <div class="stat error"><div class="stat-val" id="statError">-</div><div class="stat-label">&Uacute;ltima: Erro</div></div>
  <div class="stat skip"><div class="stat-val" id="statSkip">-</div><div class="stat-label">&Uacute;ltima: Skip</div></div>
</div>

<div class="controls">
  <span class="tag" id="tickerTag">⏱ atualizando...</span>
  <span id="statusText"></span>
</div>

<table>
  <thead>
    <tr>
      <th class="col-status"></th>
      <th class="col-name">Script</th>
      <th class="col-rec">Status</th>
      <th class="col-last">Hor&aacute;rio</th>
      <th class="col-dur">Dura&ccedil;&atilde;o</th>
    </tr>
  </thead>
  <tbody id="tableBody">
    <tr><td colspan="5"><div class="empty">Carregando...</div></td></tr>
  </tbody>
</table>

<div class="log-box">
  <h3>&Uacute;ltimas execu&ccedil;&otilde;es</h3>
  <div id="execContainer"><div class="empty">Carregando...</div></div>
</div>

<script>
const SUPABASE_URL = 'https://oaqmnaekrpukwmrxjtud.supabase.co'
const SUPABASE_KEY = 'sb_publishable_ekx47MbcOg-C1uoAPJnKWg_c9t9ndQR'
const HEADERS = { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY }

const SCRIPTS = [
  { id:'b3_aovivo', label:'B3 Ao Vivo' },
  { id:'b3_cotahist', label:'B3 Hist.' },
  { id:'fnet_dados', label:'FNET Dados' },
  { id:'fnet_rendimentos', label:'FNET Rend.' },
  { id:'youtube', label:'YouTube' },
  { id:'cvm_fii', label:'CVM FII' },
  { id:'cvm_fiagro', label:'CVM Fiagro' },
  { id:'cvm_cadastral', label:'CVM Cad.' },
  { id:'status_acoes', label:'St. A&ccedil;&otilde;es' },
  { id:'status_dividendos', label:'St. Div.' },
  { id:'fatos_ia', label:'Fatos IA' },
]

function $(id) { return document.getElementById(id) }

function dotClass(v) {
  if (!v) return 'pend'
  const l = String(v).toLowerCase()
  if (l.startsWith('ok')) return 'ok'
  if (l.startsWith('erro')) return 'erro'
  if (l.startsWith('skip')) return 'skip'
  return 'pend'
}

function fmtTime(s) {
  if (!s) return '&mdash;'
  const d = new Date(s.includes('T') ? s : s.replace(' ', 'T'))
  return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
}

function fmtFull(s) {
  if (!s) return '&mdash;'
  const d = new Date(s.includes('T') ? s : s.replace(' ', 'T'))
  return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
}

function escHtml(s) {
  if (!s) return ''
  const d = document.createElement('div')
  d.textContent = s
  return d.innerHTML
}

async function carregar() {
  try {
    const r = await fetch(SUPABASE_URL + '/rest/v1/log_atualizacao?select=*&order=id.desc&limit=200', { headers: HEADERS })
    if (!r.ok) throw new Error(String(r.status))
    const rows = await r.json()
    render(rows)
  } catch (e) {
    $('statusBar').textContent = 'Erro ao carregar: ' + e.message
    $('tableBody').innerHTML = '<tr><td colspan="5"><div class="empty">Falha ao conectar com a base de dados</div></td></tr>'
  }
}

function render(rows) {
  if (!rows || !rows.length) {
    $('statusBar').textContent = 'Nenhum registro encontrado'
    $('tableBody').innerHTML = '<tr><td colspan="5"><div class="empty">Nenhuma execu&ccedil;&atilde;o registrada ainda</div></td></tr>'
    $('execContainer').innerHTML = '<div class="empty">Nenhuma execu&ccedil;&atilde;o registrada ainda</div>'
    return
  }

  const latest = rows[0]
  const finishedAt = latest.finished_at || latest.started_at
  $('statusBar').innerHTML = '&Uacute;ltima atualiza&ccedil;&atilde;o: <strong>' + escHtml(fmtFull(finishedAt)) + '</strong>'
  $('tickerTag').textContent = '⏱ ' + fmtTime(new Date().toISOString())

  // Stats
  let ok = 0, erro = 0, skip = 0
  for (const s of SCRIPTS) {
    const cls = dotClass(latest[s.id])
    if (cls === 'ok') ok++
    else if (cls === 'erro') erro++
    else if (cls === 'skip') skip++
  }
  const pend = SCRIPTS.length - ok - erro - skip
  $('statTotal').textContent = SCRIPTS.length
  $('statOk').textContent = ok
  $('statError').textContent = erro
  $('statSkip').textContent = skip
  $('statusText').textContent = pend > 0 ? pend + ' pendente(s)' : ''
  $('statusText').style.color = pend > 0 ? 'var(--accent)' : 'var(--green)'

  // Table - latest status per script
  const dias = ['Dom','Seg','Ter','Qua','Qui','Sex','Sab']
  function dayName(n) { return dias[n] || '' }

  // Determinar se esta rodando (se ultima exec foi a menos de 15min)
  const now = new Date()
  const runningThreshold = 15 * 60 * 1000

  $('tableBody').innerHTML = SCRIPTS.map(s => {
    const val = latest[s.id]
    const cls = dotClass(val)
    const isRunning = latest.finished_at && (now - new Date(latest.finished_at)) < runningThreshold && cls === 'ok'
    const statusLabel = cls === 'ok' ? (isRunning ? 'Rodando' : 'OK') : (cls === 'erro' ? 'Erro' : (cls === 'skip' ? 'Pulado' : 'Pendente'))
    return `<tr>
      <td class="col-status"><span class="dot ${cls}" title="${statusLabel}"></span></td>
      <td class="col-name">${s.label}</td>
      <td>${statusLabel}</td>
      <td class="col-last">${fmtTime(latest.finished_at)}</td>
      <td class="col-dur">${val && val !== 'SKIP' ? escHtml(val) : '-'}</td>
    </tr>`
  }).join('')

  // Execution history by date
  const groups = {}
  for (const r of rows) {
    const key = (r.finished_at || r.started_at || '').slice(0, 10)
    if (!groups[key]) groups[key] = []
    groups[key].push(r)
  }

  const keys = Object.keys(groups).sort().reverse()
  let html = '<div class="exec-list">'
  for (const k of keys) {
    const items = groups[k]
    html += '<div class="exec-group">'
    html += '<div class="exec-date">' + k.split('-').reverse().join('/') + ' &mdash; ' + items.length + ' execu&ccedil;&otilde;es</div>'
    for (const r of items) {
      const t = r.finished_at || r.started_at || ''
      html += '<div class="exec-row">'
      html += '<span class="exec-time">' + fmtTime(t) + '</span>'
      for (const s of SCRIPTS) {
        const v = r[s.id]
        const cls = dotClass(v)
        html += '<span class="exec-cell"><span class="dot ' + cls + '"></span><span class="exec-label">' + s.label + '</span></span>'
      }
      html += '</div>'
    }
    html += '</div>'
  }
  html += '</div>'
  $('execContainer').innerHTML = html
}

carregar()
setInterval(carregar, 30000)
</script>
</body>
</html>
