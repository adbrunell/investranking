<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invest Ranking — Gerenciador</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#111318;--surface:#1a1d24;--surface2:#1f232b;--border:#2a2e36;
  --text:#e2e5e9;--text-muted:#8a909a;--heading:#eef0f3;
  --accent:#ffde59;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;--blue:#60a5fa;
  --radius:8px;--font:'Segoe UI',system-ui,-apple-system,sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;padding:24px;min-height:100vh}
h1{font-size:20px;color:var(--heading);margin-bottom:2px;font-weight:600}
.sub{color:var(--text-muted);font-size:13px;margin-bottom:20px}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center}
.stat-val{font-size:22px;font-weight:700;line-height:1.2}
.stat-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px}
.stat.total .stat-val{color:var(--text)}
.stat.ok .stat-val{color:var(--green)}
.stat.erro .stat-val{color:var(--red)}
.stat.skip .stat-val{color:var(--text-muted)}

.info{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;font-size:12px;color:var(--text-muted)}
.info .tag{background:var(--border);padding:4px 10px;border-radius:6px;font-size:11px}

table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px}
thead{background:var(--surface2)}
th{padding:8px 10px;text-align:left;font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;font-weight:600;border-bottom:1px solid var(--border)}
td{padding:6px 10px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.02);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}

.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot.ok{background:var(--green)}
.dot.erro{background:var(--red)}
.dot.skip{background:#555}
.dot.pend{background:var(--accent)}
.dot-title{display:inline-flex;align-items:center;gap:6px}

.col-time{color:var(--text-muted);white-space:nowrap;width:50px}
.col-dur{color:var(--text-muted);font-size:11px;width:40px}

.histo{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.histo-title{font-size:13px;color:var(--heading);font-weight:600;padding:12px 14px 6px}
.histo table{margin-bottom:0;border:none;border-radius:0}

@keyframes pulse{0%{opacity:1}50%{opacity:.3}100%{opacity:1}}
.empty{color:var(--text-muted);text-align:center;padding:30px;font-size:13px}
@media(max-width:640px){
  body{padding:12px}
  .stats{grid-template-columns:repeat(2,1fr)}
  th,td{padding:5px 6px;font-size:11px}
}
</style>
</head>
<body>

<h1>Gerenciador</h1>
<p class="sub" id="statusBar">Carregando...</p>

<div class="stats">
  <div class="stat total"><div class="stat-val" id="statTotal">-</div><div class="stat-label">Scripts</div></div>
  <div class="stat" style="--stat-color:var(--blue)"><div class="stat-val" id="statRunning" style="color:var(--blue)">-</div><div class="stat-label">Rodando</div></div>
  <div class="stat ok"><div class="stat-val" id="statOk">-</div><div class="stat-label">OK</div></div>
  <div class="stat erro"><div class="stat-val" id="statErro">-</div><div class="stat-label">Erro</div></div>
</div>

<div class="info">
  <span class="tag" id="tickerTag">⏱ -</span>
  <span id="statusText"></span>
  <span id="managerBadge" style="margin-left:auto;font-size:11px;display:flex;align-items:center;gap:4px">⋯ manager</span>
</div>

<table>
  <thead><tr>
    <th style="width:14px"></th>
    <th>Script</th>
    <th style="width:60px">Status</th>
    <th class="col-time">Hor&aacute;rio</th>
    <th class="col-dur">Dur.</th>
  </tr></thead>
  <tbody id="tableBody">
    <tr><td colspan="5"><div class="empty">Carregando...</div></td></tr>
  </tbody>
</table>

<div class="histo">
  <div class="histo-title">Execu&ccedil;&otilde;es recentes</div>
  <table>
    <thead><tr>
      <th style="width:50px">Hora</th>
      <th>B3 Ao Vivo</th>
      <th>B3 Hist.</th>
      <th>FNET</th>
      <th>FNET R.</th>
      <th>YouTube</th>
      <th>CVM FII</th>
      <th>CVM Fiag.</th>
      <th>CVM Cad.</th>
      <th>St. A&ccedil;&otilde;es</th>
      <th>St. Div.</th>
      <th>Fatos IA</th>
    </tr></thead>
    <tbody id="histoBody">
      <tr><td colspan="12"><div class="empty">Carregando...</div></td></tr>
    </tbody>
  </table>
</div>

<script>
const SUPABASE_URL = 'https://oaqmnaekrpukwmrxjtud.supabase.co'
const SUPABASE_KEY = 'sb_publishable_ekx47MbcOg-C1uoAPJnKWg_c9t9ndQR'
const HEADERS = { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY }

let managerStatus = null  // { scripts: { nome: { running: bool, status: str } } }

const S = [
  { id:'b3_aovivo', mid:'B3_COTACOES', label:'B3 Ao Vivo' },
  { id:'b3_cotahist', mid:'B3_COTAHIST', label:'B3 Hist.' },
  { id:'fnet_dados', mid:'FNET_DADOS', label:'FNET Dados' },
  { id:'fnet_rendimentos', mid:'FNET_RENDIMENTOS', label:'FNET Rend.' },
  { id:'youtube', mid:'YOUTUBE', label:'YouTube' },
  { id:'cvm_fii', mid:'CVM_FII', label:'CVM FII' },
  { id:'cvm_fiagro', mid:'CVM_FIAGRO', label:'CVM Fiagro' },
  { id:'cvm_cadastral', mid:'CVM_CADASTRAL', label:'CVM Cad.' },
  { id:'status_acoes', mid:'STATUS_ACOES', label:'St. Ações' },
  { id:'status_dividendos', mid:'STATUS_DIVIDENDOS', label:'St. Div.' },
  { id:'fatos_ia', mid:'FATOS_IA', label:'Fatos IA' },
]

function $(id) { return document.getElementById(id) }

function dot(v) {
  if (!v) return 'pend'
  const l = String(v).toLowerCase()
  if (l.startsWith('ok')) return 'ok'
  if (l.startsWith('erro')) return 'erro'
  if (l.startsWith('skip')) return 'skip'
  return 'pend'
}

function fmt(s) {
  if (!s) return '-'
  const d = new Date(s.includes('T') ? s : s.replace(' ', 'T'))
  return d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' })
}

function esc(s) {
  const d = document.createElement('div')
  d.textContent = s || ''
  return d.innerHTML
}

async function checkManager() {
  const el = $('managerBadge')
  try {
    const r = await fetch('http://127.0.0.1:8081/api/status', { signal: AbortSignal.timeout(2000) })
    if (r.ok) {
      managerStatus = await r.json()
      const running = Object.values(managerStatus.scripts || {}).filter(s => s.running).length
      el.innerHTML = `<span style="color:var(--green)">●</span> manager ativo${running ? ' (' + running + ' rodando)' : ''}`
      renderTable()  // re-render to show live status
    } else {
      managerStatus = null
      el.innerHTML = `<span style="color:var(--red)">●</span> manager offline`
    }
  } catch {
    managerStatus = null
    el.innerHTML = `<span style="color:#555">●</span> manager offline`
  }
}

async function load() {
  // Sempre carrega historico do banco
  let dbRows = []
  try {
    const r = await fetch(SUPABASE_URL + '/rest/v1/log_atualizacao?select=*&order=id.desc&limit=150', { headers: HEADERS })
    if (r.ok) dbRows = await r.json()
  } catch (_) {}

  const hasManager = managerStatus && managerStatus.scripts
  const now = new Date()
  $('tickerTag').textContent = '⏱ ' + now.toLocaleTimeString('pt-BR')

  if (hasManager) {
    // Manager online: usa dados EM TEMPO REAL do manager
    renderFromManager(dbRows)
  } else if (dbRows.length) {
    // Manager offline: usa ultimos dados do banco
    renderFromDB(dbRows)
  } else {
    // Nada disponivel
    $('statusBar').textContent = 'Nenhum dado disponivel'
    $('tableBody').innerHTML = '<tr><td colspan="5"><div class="empty">Manager offline e banco sem dados</div></td></tr>'
    $('histoBody').innerHTML = '<tr><td colspan="12"><div class="empty">Vazio</div></td></tr>'
  }

  // Historico sempre do banco (se tiver)
  if (dbRows.length) {
    $('histoBody').innerHTML = dbRows.map(r => {
      const t = r.finished_at || r.started_at || ''
      return `<tr>
        <td class="col-time">${fmt(t)}</td>
        ${S.map(s => {
          const v = r[s.id]
          return `<td><span class="dot ${dot(v)}" title="${esc(v || '')}"></span></td>`
        }).join('')}
      </tr>`
    }).join('')
  }
}

function renderFromManager(dbRows) {
  const ms = managerStatus.scripts
  const now = new Date()

  // Stats
  let running = 0, ok = 0, erro = 0, total = 0
  for (const s of S) {
    const m = ms[s.mid]
    if (!m) continue
    total++
    if (m.running) running++
    else if (m.status === 'ok') ok++
    else if (m.status === 'error') erro++
  }
  $('statTotal').textContent = total
  $('statRunning') ? ($('statRunning').textContent = running) : 0
  $('statOk').textContent = ok
  $('statErro').textContent = erro
  $('statSkip').textContent = S.length - total - running
  $('statusText').textContent = running ? running + ' rodando' : 'OK'
  $('statusText').style.color = running ? 'var(--blue)' : 'var(--green)'

  // Data mais recente entre DB e manager
  const lastDb = dbRows && dbRows.length ? dbRows[0] : null
  const lastManagerTime = Object.values(ms).reduce((latest, s) => {
    const t = s.last_run ? new Date(s.last_run).getTime() : 0
    return t > latest ? t : latest
  }, 0)
  const lastDbTime = lastDb && (lastDb.finished_at || lastDb.started_at) ? new Date(lastDb.finished_at || lastDb.started_at).getTime() : 0
  const newestTime = Math.max(lastManagerTime, lastDbTime)
  $('statusBar').innerHTML = '&Uacute;ltima atualiza&ccedil;&atilde;o: <strong>' + (newestTime ? new Date(newestTime).toLocaleString('pt-BR') : '-') + '</strong>'

  // Tabela
  $('tableBody').innerHTML = S.map(s => {
    const m = ms[s.mid]
    const isRunning = m && m.running
    const isOnline = !!m

    let c, label, time, dur
    if (!isOnline) {
      c = 'pend'
      label = 'N/A'
      time = '-'
      dur = '-'
    } else if (isRunning) {
      c = 'running'
      label = 'Rodando'
      time = 'agora'
      dur = (m.last_duration || 0) + 's'
    } else if (m.status === 'ok') {
      c = 'ok'
      label = 'OK'
      time = m.last_run ? fmt(m.last_run) : '-'
      dur = (m.last_duration || 0) + 's'
    } else if (m.status === 'error') {
      c = 'erro'
      label = 'Erro'
      time = m.last_run ? fmt(m.last_run) : '-'
      dur = (m.last_duration || 0) + 's'
    } else {
      c = 'pend'
      label = 'Pend.'
      time = '-'
      dur = '-'
    }

    const dotStyle = isRunning ? 'background:var(--blue);animation:pulse .8s infinite' : ''

    return `<tr>
      <td><span class="dot" style="${dotStyle};width:8px;height:8px;border-radius:50%;display:inline-block"></span></td>
      <td class="dot-title"><span class="dot" style="${dotStyle};width:8px;height:8px;border-radius:50%;display:inline-block"></span>${s.label}</td>
      <td style="${isRunning ? 'color:var(--blue);font-weight:600' : ''}">${label}</td>
      <td class="col-time">${time}</td>
      <td class="col-dur">${dur}</td>
    </tr>`
  }).join('')
}

function renderFromDB(rows) {
  const last = rows[0]
  const ft = last.finished_at || last.started_at
  $('statusBar').innerHTML = '&Uacute;ltima atualiza&ccedil;&atilde;o: <strong>' + esc(ft ? new Date(ft).toLocaleString('pt-BR') : '-') + '</strong>'

  let ok = 0, erro = 0, skip = 0
  for (const s of S) {
    const c = dot(last[s.id])
    if (c === 'ok') ok++; else if (c === 'erro') erro++; else if (c === 'skip') skip++
  }
  $('statTotal').textContent = S.length
  $('statOk').textContent = ok
  $('statErro').textContent = erro
  $('statSkip').textContent = skip
  const pend = S.length - ok - erro - skip
  $('statusText').textContent = pend > 0 ? pend + ' pendente' : 'OK'
  $('statusText').style.color = pend > 0 ? 'var(--accent)' : 'var(--green)'

  $('tableBody').innerHTML = S.map(s => {
    const v = last[s.id]
    const c = dot(v)
    return `<tr>
      <td><span class="dot ${c}"></span></td>
      <td class="dot-title"><span class="dot ${c}"></span>${s.label}</td>
      <td>${c === 'ok' ? 'OK' : c === 'erro' ? 'Erro' : c === 'skip' ? 'Pulado' : 'Pend.'}</td>
      <td class="col-time">${fmt(last.finished_at)}</td>
      <td class="col-dur">${v && v !== 'SKIP' ? esc(v) : '-'}</td>
    </tr>`
  }).join('')
}

load()
checkManager()
setInterval(load, 30000)
setInterval(checkManager, 10000)
</script>
</body>
</html>
