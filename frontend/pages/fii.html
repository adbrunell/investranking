<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FII - Análise</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container">
        <div class="top-bar sticky-top">
            <span class="label-small">Fundo:</span>
            <div class="fund-search-wrapper search-box-limit">
                <input list="fund-list" id="fund-search" placeholder="Buscar..." onchange="changeFund(this.value)">
                <datalist id="fund-list"></datalist>
            </div>
            <div class="price-header-row">
                <span class="fund-price-small" id="fund-price">—</span>
                <span class="fund-price-change-small" id="fund-change">&nbsp;</span>
            </div>
            <div class="range-selector" id="range-selector">
                <button class="btn-range" data-range="7">7D</button>
                <button class="btn-range" data-range="30">1M</button>
                <button class="btn-range" data-range="90">3M</button>
                <button class="btn-range" data-range="180">6M</button>
                <button class="btn-range active" data-range="365">1A</button>
                <button class="btn-range" data-range="730">2A</button>
                <button class="btn-range" data-range="1095">3A</button>
                <button class="btn-range" data-range="0">Tudo</button>
            </div>
        </div>

        <div class="chart-card">
            <div class="chart-header">
                <h2 class="chart-title">Cotação x Liquidez x Anúncios</h2>
            </div>
            <div class="chart-container-boxed">
                <div class="stats-grid grid-4" id="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Mínimo</div>
                        <div class="stat-value" id="stat-min">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Máximo</div>
                        <div class="stat-value" id="stat-max">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Variação</div>
                        <div class="stat-value" id="stat-var">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Volume Médio</div>
                        <div class="stat-value" id="stat-vol">—</div>
                    </div>
                </div>
                <div class="chart-wrapper">
                    <canvas id="chart"></canvas>
                    <canvas id="chart-overlay"></canvas>
                    <div class="chart-tooltip" id="tooltip">
                        <div class="tt-date" id="tt-date"></div>
                        <div class="tt-price" id="tt-price"></div>
                        <div class="tt-vol" id="tt-vol"></div>
                        <div class="tt-marker" id="tt-marker"></div>
                        <div class="tt-marker-sub" id="tt-marker-sub"></div>
                    </div>
                </div>
            </div>
            <div class="marker-filters" id="marker-filters">
                <label class="filter-label">
                    <span class="toggle-switch" data-type="relatorio">
                        <input type="checkbox" data-type="relatorio" checked onchange="toggleMarker(this)">
                        <span class="toggle-slider"></span>
                    </span>
                    Relatórios
                </label>
                <label class="filter-label">
                    <span class="toggle-switch" data-type="relevante">
                        <input type="checkbox" data-type="relevante" checked onchange="toggleMarker(this)">
                        <span class="toggle-slider"></span>
                    </span>
                    Fatos Relevantes
                </label>
                <label class="filter-label">
                    <span class="toggle-switch" data-type="dividendo">
                        <input type="checkbox" data-type="dividendo" onchange="toggleMarker(this)">
                        <span class="toggle-slider"></span>
                    </span>
                    Dividendos
                </label>
                <label class="filter-label">
                    <span class="toggle-switch" data-type="youtube">
                        <input type="checkbox" data-type="youtube" onchange="toggleMarker(this)">
                        <span class="toggle-slider"></span>
                    </span>
                    Vídeos
                </label>
                <div id="yt-channel-btn" class="yt-channel-btn" style="display:none" onclick="toggleYoutubePanel(event)">
                    <span id="yt-channel-label">Canais</span>
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="#999" stroke-width="1.5">
                        <path d="M2 4l3 3 3-3"/>
                    </svg>
                </div>
                <div id="yt-channel-panel" class="yt-channel-panel" style="display:none"></div>
            </div>
        </div>

        <div class="chart-card" style="margin-top:16px">
            <div class="chart-header">
                <h2 class="chart-title">Dividendos Pagos</h2>
            </div>
            <div class="chart-container-boxed">
                <div class="stats-grid grid-5" id="div-stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Último</div>
                        <div class="stat-value" id="div-stat-ultimo">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Últ. Yield</div>
                        <div class="stat-value" id="div-stat-ult-yield">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total</div>
                        <div class="stat-value" id="div-stat-total">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Yield Total</div>
                        <div class="stat-value" id="div-stat-total-yield">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label" id="div-label-cagr">CAGR</div>
                        <div class="stat-value" id="div-stat-cagr">—</div>
                    </div>
                </div>
                <div class="chart-wrapper">
                    <canvas id="chart-dividendos"></canvas>
                    <div class="chart-tooltip" id="tooltip-dividendos">
                        <div class="tt-date" id="tt-div-date"></div>
                        <div class="tt-value" id="tt-div-value"></div>
                    </div>
                </div>
            </div>
            <div class="cot-series-filters">
                <label class="filter-label">
                    <span class="toggle-switch" data-series="yield">
                        <input type="checkbox" data-series="yield" onchange="toggleDivYield(this)">
                        <span class="toggle-slider"></span>
                    </span>
                    Dividend Yield (%)
                </label>
            </div>
        </div>

        <div class="chart-card" style="margin-top:16px">
            <div class="chart-header">
                <h2 class="chart-title">Evolução de Cotas e Cotistas</h2>
            </div>
            <div class="chart-container-boxed">
                <div class="stats-grid grid-2" id="cot-stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Total Cotistas</div>
                        <div class="stat-value text-primary" id="cot-stat-cotistas">—</div>
                        <div class="stat-value" id="cot-stat-cresc-cot" style="font-size:11px;margin-top:2px"></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Cotas</div>
                        <div class="stat-value text-blue" id="cot-stat-cotas">—</div>
                        <div class="stat-value" id="cot-stat-cresc-cotas" style="font-size:11px;margin-top:2px"></div>
                    </div>
                </div>
                <div class="chart-wrapper">
                    <canvas id="chart-cotistas"></canvas>
                    <canvas id="chart-cotistas-overlay"></canvas>
                    <div class="chart-tooltip" id="tooltip-cotistas">
                        <div class="tt-date" id="tt-cot-date"></div>
                        <div id="tt-cot-breakdown"></div>
                    </div>
                </div>
            </div>
            <div class="cot-series-filters">
                <label class="filter-label">
                    <span class="toggle-switch" data-series="cotas">
                        <input type="checkbox" data-series="cotas" checked onchange="toggleCotSeries(this)">
                        <span class="toggle-slider"></span>
                    </span>
                    Mostrar Cotas
                </label>
            </div>
        </div>

        <div class="chart-card" style="margin-top:16px">
            <div class="chart-header">
                <h2 class="chart-title">Patrimônio Líquido</h2>
            </div>
            <div class="chart-container-boxed">
                <div class="stats-grid grid-3" id="pl-stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">PL Atual</div>
                        <div class="stat-value text-purple" id="pl-stat-atual">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Variação</div>
                        <div class="stat-value text-purple" id="pl-stat-var">—</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Mês ref.</div>
                        <div class="stat-value text-muted" id="pl-stat-data">—</div>
                    </div>
                </div>
                <div class="chart-wrapper">
                    <canvas id="chart-pl"></canvas>
                    <canvas id="chart-pl-overlay"></canvas>
                    <div class="chart-tooltip" id="tooltip-pl">
                        <div class="tt-date" id="tt-pl-date"></div>
                        <div class="tt-value" id="tt-pl-value"></div>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <span class="last-update" id="last-update">—</span>
        </footer>
    </div>
    <script src="../js/app.js"></script>
</body>

</html>
