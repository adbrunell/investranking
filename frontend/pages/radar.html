<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Anúncios</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #111318;
            --bg-card: #1a1d24;
            --text-main: #e2e5e9;
            --text-muted: #8a909a;
            --primary: #ffde59;
            --primary-hover: #fff0b3;
            --border-color: #2a2e36;
            --font-family: 'Segoe UI', system-ui, sans-serif;
            --radius: 12px;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 0 16px 16px;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }
        .topbar{position:sticky;top:0;z-index:100;background:rgba(17,19,24,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border-color);height:44px;display:flex;justify-content:space-between;align-items:center;gap:6px;flex-wrap:wrap;margin:0 -16px 10px;padding:0 20px}
        .topbar h1{font-size:18px;font-weight:600;color:var(--primary);display:flex;align-items:center;gap:8px}
        .topbar h1 span{color:var(--text-main);font-weight:400}

        .container {
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            flex-grow: 1;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .spinner {
            display: inline-block;
            animation: spin 1s linear infinite;
            color: var(--primary);
        }

        .filters-card {
            background-color: var(--bg-card);
            padding: 12px 20px;
            border-radius: var(--radius);
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 400px;
        }

        .search-icon {
            position: absolute;
            left: 11px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            background-color: var(--bg-body);
            padding: 5px 12px 5px 34px;
            border: 1px solid var(--border-color);
            border-radius: 16px;
            font-size: 12px;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s;
        }

        .search-input.select-input {
            padding-left: 16px;
            cursor: pointer;
            appearance: auto;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 1px var(--primary);
        }

        .panels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .full-width-container {
            width: 100%;
            margin-bottom: 24px;
        }

        .table-card {
            background-color: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .panel-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .panel-header:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }

        .panel-header h2 {
            margin: 0;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-icon {
            color: var(--text-muted);
            transition: transform 0.3s ease;
        }

        .is-open .toggle-icon {
            transform: rotate(180deg);
        }

        .table-scroll-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .is-open .table-scroll-container {
            max-height: 350px;
            overflow-y: auto;
            overflow-x: auto;
            border-top: 1px solid var(--border-color);
        }

        .table-scroll-container::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .table-scroll-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 10;
            background-color: var(--bg-card);
        }

        th {
            padding: 8px 16px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        td {
            padding: 8px 16px;
            font-size: 13px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .ticker-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .ticker-link:hover {
            text-decoration: underline;
        }

        .row-today td {
            background-color: rgba(255, 222, 89, 0.05);
        }

        .row-today td:first-child {
            box-shadow: inset 3px 0 0 var(--primary);
        }

        .badge-new {
            background-color: var(--primary);
            color: #131314;
            font-size: 11px;
            width: 20px;
            height: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: 700;
        }

        .valor-destaque {
            font-weight: 500;
            color: #81c995;
        }

        .truncate {
            max-width: 600px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .canal-badge {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: var(--primary); color: #000; border-radius: 50%;
            font-size: 11px; font-weight: 600; min-width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center; padding: 0 5px;
            pointer-events: none;
        }
        .canal-dropdown {
            position: fixed; z-index: 9999;
            background: #2c2c2e; border-radius: 14px; border: 1px solid #3a3a3c;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); width: 300px; max-height: 360px;
            display: flex; flex-direction: column; overflow: hidden;
            animation: dropIn 0.15s ease-out;
        }
        @keyframes dropIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
        .canal-search-wrap {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 12px; border-bottom: 1px solid #3a3a3c;
            color: #8e8e93;
        }
        .canal-search {
            flex: 1; background: none; border: none; outline: none;
            color: var(--text-main); font-size: 14px; font-family: var(--font-family);
        }
        .canal-search::placeholder { color: #636366; }
        .canal-list { flex: 1; overflow-y: auto; padding: 6px 0; -webkit-overflow-scrolling: touch; max-height: 260px; }
        .canal-list::-webkit-scrollbar { width: 4px; }
        .canal-list::-webkit-scrollbar-thumb { background: #48484a; border-radius: 2px; }
        .canal-option {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; cursor: pointer; transition: background 0.15s;
            font-size: 13px; color: var(--text-main);
        }
        .canal-option:hover { background: rgba(255,255,255,0.05); }
        .canal-option.selected { color: var(--primary); }
        .canal-check {
            width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid #48484a;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; flex-shrink: 0;
        }
        .canal-option.selected .canal-check {
            background: var(--primary); border-color: var(--primary);
        }
        .canal-option.selected .canal-check::after {
            content: ''; width: 8px; height: 5px; border-left: 2px solid #000;
            border-bottom: 2px solid #000; transform: rotate(-45deg) translateY(-1px);
        }
        .canal-actions {
            display: flex; gap: 8px; padding: 8px 12px; border-top: 1px solid #3a3a3c;
        }
        .canal-action-btn {
            flex: 1; padding: 8px; border-radius: 10px; border: none;
            font-size: 13px; font-weight: 500; cursor: pointer;
            font-family: var(--font-family); transition: opacity 0.15s;
            background: #3a3a3c; color: var(--text-main);
        }
        .canal-action-btn.primary { background: var(--primary); color: #000; font-weight: 600; }
        .canal-action-btn:active { opacity: 0.7; }

        @media (max-width: 600px) {
            .canal-dropdown { width: calc(100vw - 32px); }
        }

        .btn {
            background-color: var(--primary);
            color: #131314;
            border: none;
            padding: 8px 24px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .message-container {
            padding: 30px;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>

<div class="topbar"><h1>Radar <span>de An&uacute;ncios</span></h1>
<div class="search-wrapper" style="flex:1;max-width:200px">
<div class="search-icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg></div>
<input list="fundos-list" id="filter-fundo" class="search-input" placeholder="Buscar por c&oacute;digo..." oninput="debounceRender()"><datalist id="fundos-list"></datalist>
</div>
<div class="search-wrapper" id="canal-filter-wrap" style="max-width:180px">
<div class="search-icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"></path></svg></div>
<input id="canal-filter-input" class="search-input" placeholder="Filtrar por canal..." readonly onclick="toggleCanalDropdown()" style="cursor:pointer">
<span id="canal-filter-badge" class="canal-badge hidden"></span>
<div id="canal-dropdown" class="canal-dropdown hidden">
<div class="canal-search-wrap"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input id="canal-search" class="canal-search" type="text" placeholder="Buscar canal..." oninput="filterCanalOptions()"></div>
<div class="canal-list" id="canal-list"></div>
<div class="canal-actions"><button class="canal-action-btn" onclick="clearCanalFilter()">Limpar</button><button class="canal-action-btn primary" onclick="toggleCanalDropdown()">OK</button></div>
</div>
        </div>
        <button id="btn-carregar-tudo" class="btn" onclick="loadFullData()" title="Carregar base completa (pode demorar)" style="font-size:11px;padding:4px 14px;flex-shrink:0"><i class="fas fa-download"></i> <span>Carregar tudo</span></button>
    </div>

    <div class="container">

        <div class="panels-grid">
            <div id="card-relatorios" class="table-card">
                <div class="panel-header" onclick="togglePanel('card-relatorios')">
                    <h2 id="title-relatorios"><i class="fas fa-file-alt" style="color:var(--primary);font-size:15px"></i> Relatorios (0) <span id="header-badge-relatorios"
                            class="badge-new hidden"></span></h2>
                    <div class="toggle-icon"><svg width="18" height="18" fill="none" stroke="currentColor"
                            stroke-width="2" viewBox="0 0 24 24">
                            <path d="M19 9l-7 7-7-7"></path>
                        </svg></div>
                </div>
                <div id="msg-relatorios" class="message-container hidden">
                    <div class="spinner"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
                        </svg></div>
                </div>
                <div class="table-scroll-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Publicação</th>
                                <th>Fundo</th>
                                <th>Referência</th>
                            </tr>
                        </thead>
                        <tbody id="body-relatorios"></tbody>
                    </table>
                </div>
            </div>

            <div id="card-fatos" class="table-card">
                <div class="panel-header" onclick="togglePanel('card-fatos')">
                    <h2 id="title-fatos"><i class="fas fa-bolt" style="color:var(--primary);font-size:15px"></i> Fatos Relevantes (0) <span id="header-badge-fatos"
                            class="badge-new hidden"></span></h2>
                    <div class="toggle-icon"><svg width="18" height="18" fill="none" stroke="currentColor"
                            stroke-width="2" viewBox="0 0 24 24">
                            <path d="M19 9l-7 7-7-7"></path>
                        </svg></div>
                </div>
                <div id="msg-fatos" class="message-container hidden">
                    <div class="spinner"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
                        </svg></div>
                </div>
                <div class="table-scroll-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Publicação</th>
                                <th>Fundo</th>
                                <th>Referência</th>
                            </tr>
                        </thead>
                        <tbody id="body-fatos"></tbody>
                    </table>
                </div>
            </div>

            <div id="card-dividendos" class="table-card">
                <div class="panel-header" onclick="togglePanel('card-dividendos')">
                    <h2 id="title-dividendos"><i class="fas fa-money-bill-wave" style="color:var(--primary);font-size:15px"></i> Rendimentos (0) <span id="header-badge-dividendos"
                            class="badge-new hidden"></span></h2>
                    <div class="toggle-icon"><svg width="18" height="18" fill="none" stroke="currentColor"
                            stroke-width="2" viewBox="0 0 24 24">
                            <path d="M19 9l-7 7-7-7"></path>
                        </svg></div>
                </div>
                <div id="msg-dividendos" class="message-container hidden">
                    <div class="spinner"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
                        </svg></div>
                </div>
                <div class="table-scroll-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Publicação</th>
                                <th>Fundo</th>
                                <th>Data Pgto</th>
                                <th>Valor</th>
                            </tr>
                        </thead>
                        <tbody id="body-dividendos"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="full-width-container">
            <div id="card-videos" class="table-card">
                <div class="panel-header" onclick="togglePanel('card-videos')">
                    <h2 id="title-videos"><i class="fab fa-youtube" style="color:var(--primary);font-size:15px"></i> Videos no YouTube (0) <span id="header-badge-videos"
                            class="badge-new hidden"></span></h2>
                    <div class="toggle-icon"><svg width="18" height="18" fill="none" stroke="currentColor"
                            stroke-width="2" viewBox="0 0 24 24">
                            <path d="M19 9l-7 7-7-7"></path>
                        </svg></div>
                </div>
                <div id="msg-videos" class="message-container hidden">
                    <div class="spinner"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12a9 9 0 1 1-6.219-8.56"></path>
                        </svg></div>
                </div>
                <div class="table-scroll-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Publicação</th>
                                <th>Fundo</th>
                                <th>Canal</th>
                                <th>Título</th>
                                <th>Duração</th>
                            </tr>
                        </thead>
                        <tbody id="body-videos"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const REST = 'https://oaqmnaekrpukwmrxjtud.supabase.co/rest/v1'
        const HEADERS = { apikey: 'sb_publishable_ekx47MbcOg-C1uoAPJnKWg_c9t9ndQR', Authorization: 'Bearer sb_publishable_ekx47MbcOg-C1uoAPJnKWg_c9t9ndQR' }
        const FETCH_TIMEOUT = 10000

        let data = { rel: [], fat: [], div: [], vid: [] },
            dataFull = { rel: [], fat: [], div: [], vid: [] },
            dataSearch = { rel: [], fat: [], div: [], vid: [] },
            allCodes = new Set,
            fullLoaded = false,
            searchActive = false,
            searchController = null

        function pDate(s) { if (!s) return new Date(0); let d = new Date(s); return isNaN(d.getTime()) ? new Date(0) : d }

        const LS_KEY_CANAL = 'radar_canal_filter'
        let _renderTimer = null
        function debounceRender() {
            clearTimeout(_renderTimer)
            _renderTimer = setTimeout(() => {
                let term = document.getElementById('filter-fundo').value.trim()
                if (term.length >= 2) {
                    triggerSearch(term)
                } else {
                    if (searchActive) {
                        searchActive = false
                        searchController?.abort()
                    }
                    renderTables()
                }
            }, 120)
        }

        function triggerSearch(term) {
            searchController?.abort()
            searchController = new AbortController()
            searchActive = true
            let s = searchController.signal
            let to = setTimeout(() => searchController?.abort(), FETCH_TIMEOUT)
            async function fetchCat(url) {
                try {
                    let r = await fetch(url + '&codigo_fundo=like.*' + encodeURIComponent(term) + '*&limit=500', { headers: HEADERS, signal: s })
                    return r.ok ? r.json() : []
                } catch { return [] }
            }
            Promise.allSettled([
                fetchCat(REST + '/fnet_tudo?select=' + FNET_BASE + '&categoria_documento=like.*Relat*rio*&situacao_documento=eq.A&order=data_entrega.desc'),
                fetchCat(REST + '/fnet_tudo?select=' + FNET_BASE + '&categoria_documento=like.*Fato*&situacao_documento=eq.A&order=data_entrega.desc'),
                fetchCat(REST + '/fnet_tudo?select=' + FNET_BASE + DIV_EXTRA + '&tipo_documento=like.*Rendimentos*&tipo=neq.&situacao_documento=eq.A&order=data_entrega.desc'),
            ]).then(([rRel, rFat, rDiv]) => {
                clearTimeout(to)
                if (s.aborted) return
                dataSearch.rel = rRel.status === 'fulfilled' ? processFnet(rRel.value) : []
                dataSearch.fat = rFat.status === 'fulfilled' ? processFnet(rFat.value) : []
                dataSearch.div = rDiv.status === 'fulfilled' ? processDiv(rDiv.value) : []
                renderTables()
            })
        }

        function getDisplayData() {
            if (searchActive) return dataSearch
            if (fullLoaded) return dataFull
            return data
        }
        function getSavedCanais() {
            try { return JSON.parse(localStorage.getItem(LS_KEY_CANAL)) || [] } catch { return [] }
        }
        function saveCanalFilter() {
            let selected = getSelectedCanais()
            localStorage.setItem(LS_KEY_CANAL, JSON.stringify(selected))
            updateCanalBadge(selected)
        }
        function getSelectedCanais() {
            return Array.from(document.querySelectorAll('#canal-list .canal-option.selected')).map(el => el.dataset.canal)
        }
        function updateCanalBadge(selected) {
            let badge = document.getElementById('canal-filter-badge')
            let input = document.getElementById('canal-filter-input')
            if (selected.length === 0) {
                badge.classList.add('hidden')
                input.placeholder = 'Filtrar por canal...'
            } else {
                badge.textContent = selected.length
                badge.classList.remove('hidden')
                input.placeholder = selected.length + ' canal(is) selecionado(s)'
            }
        }
        function toggleCanalDropdown() {
            let dd = document.getElementById('canal-dropdown')
            let wasHidden = dd.classList.contains('hidden')
            dd.classList.toggle('hidden')
            if (wasHidden) {
                let wrap = document.getElementById('canal-filter-wrap')
                let rect = wrap.getBoundingClientRect()
                dd.style.top = (rect.bottom + 6) + 'px'
                dd.style.left = rect.left + 'px'
                document.getElementById('canal-search').value = ''
                filterCanalOptions()
                setTimeout(() => document.getElementById('canal-search').focus(), 50)
            }
        }
        function filterCanalOptions() {
            let q = document.getElementById('canal-search').value.toLowerCase()
            document.querySelectorAll('#canal-list .canal-option').forEach(el => {
                el.style.display = el.dataset.canal.toLowerCase().includes(q) ? '' : 'none'
            })
        }
        function toggleCanalOption(el) {
            el.classList.toggle('selected')
            saveCanalFilter()
            renderVideos()
        }
        function clearCanalFilter() {
            document.querySelectorAll('#canal-list .canal-option.selected').forEach(el => el.classList.remove('selected'))
            saveCanalFilter()
            renderVideos()
        }
        function populateCanalFilter(videos) {
            let list = document.getElementById('canal-list')
            let canais = [...new Set(videos.map(v => v.canal).filter(Boolean))].sort()
            let saved = getSavedCanais()
            list.innerHTML = canais.map(c => {
                let sel = saved.includes(c) ? ' selected' : ''
                return '<div class="canal-option' + sel + '" data-canal="' + c.replace(/"/g, '&quot;') + '" onclick="toggleCanalOption(this)"><div class="canal-check"></div><span>' + c + '</span></div>'
            }).join('')
            updateCanalBadge(saved)
        }

        // Base URL parts for fnet_tudo queries
        const FNET_BASE = 'codigo_fundo,cnpj,status,data_referencia,data_entrega,link_visualizar,tipo_documento'
        const DIV_EXTRA = ',data_com,data_pagamento,tipo,rendimento,nome_fundo_documento'

        function processFnet(rows) {
            return rows.filter(r => r.codigo_fundo).map(r => ({
                fundo: r.codigo_fundo,
                pubStr: r.data_entrega,
                refStr: r.data_referencia,
                link: r.link_visualizar || '',
                pubDate: pDate(r.data_entrega)
            })).filter(d => d.link).sort((a, b) => b.pubDate - a.pubDate)
        }

        function processDiv(rows) {
            return rows.filter(r => r.codigo_fundo && r.tipo).map(r => ({
                fundo: r.codigo_fundo,
                dataCom: r.data_com,
                dataPgto: r.data_pagamento,
                valor: r.rendimento,
                link: r.link_visualizar || '',
                pubStr: r.data_entrega,
                pubDate: pDate(r.data_entrega)
            })).sort((a, b) => b.pubDate - a.pubDate)
        }

        async function api(url) {
            const ac = new AbortController(); const t = setTimeout(() => ac.abort(), FETCH_TIMEOUT)
            try {
                let r = await fetch(url, { headers: HEADERS, signal: ac.signal })
                if (!r.ok) throw new Error(r.status + ' ' + await r.text())
                return r.json()
            } finally { clearTimeout(t) }
        }

        async function apiAll(url) {
            let PAGE = 1000, all = [], r
            const ac = new AbortController(); const t = setTimeout(() => ac.abort(), FETCH_TIMEOUT)
            try {
                r = await fetch(url + '&limit=' + PAGE, { headers: { ...HEADERS, 'Prefer': 'count=exact' }, signal: ac.signal })
            } finally { clearTimeout(t) }
            if (!r || !r.ok) throw new Error('Falha ao carregar dados completos')
            let total = 0, cr = r.headers.get('content-range')
            if (cr) { let m = cr.match(/\/(\d+)$/); if (m) total = +m[1] }
            let first = await r.json()
            all.push(...first)
            if (total > PAGE) {
                let offsets = []
                for (let i = PAGE; i < total; i += PAGE) offsets.push(i)
                for (let i = 0; i < offsets.length; i += 5) {
                    let batch = offsets.slice(i, i + 5).map(o => {
                        const ac2 = new AbortController(); setTimeout(() => ac2.abort(), FETCH_TIMEOUT)
                        return fetch(url + '&limit=' + PAGE + '&offset=' + o, { headers: HEADERS, signal: ac2.signal }).then(x => { if (!x.ok) throw new Error(x.status); return x.json() })
                    })
                    let results = await Promise.allSettled(batch)
                    results.forEach((x, idx) => {
                        if (x.status === 'fulfilled') all.push(...x.value)
                        else console.warn('Falha no lote ' + (offsets[i + idx]) + ': ' + x.reason)
                    })
                }
            }
            return all
        }

        function togglePanel(id) { document.getElementById(id).classList.toggle('is-open') }

        window.onload = loadData

        function hideSpinners() {
            document.querySelectorAll('.message-container').forEach(m => m.classList.add('hidden'))
        }

        const SIT_ATIVO = '&situacao_documento=eq.A'
        function qTudo(select, extra) {
            return REST + '/fnet_tudo?select=' + select + extra + SIT_ATIVO + '&order=data_entrega.desc'
        }

        function qTudoLimit(select, extra, limit) {
            return qTudo(select, extra) + '&limit=' + limit
        }

        function fDivExtra(extra) {
            return extra ? DIV_EXTRA : ''
        }

        async function loadData() {
            document.querySelectorAll('.table-card .message-container').forEach(m => m.classList.remove('hidden'))

            try {
                // Carrega lista de tickers do 00_fundos_master
                try {
                    let master = await api(REST + '/00_fundos_master?select=ticker&limit=1000')
                    allCodes = new Set(master.map(t => t.ticker).filter(Boolean).sort())
                    populateDatalist()
                } catch (e) { console.warn('00_fundos_master:', e) }

                let [rRel, rFat, rDiv, rVid] = await Promise.allSettled([
                    api(qTudoLimit(FNET_BASE, '&categoria_documento=like.*Relat*rio*', 500)),
                    api(qTudoLimit(FNET_BASE, '&categoria_documento=like.*Fato*', 500)),
                    api(qTudoLimit(FNET_BASE + DIV_EXTRA, '&tipo_documento=like.*Rendimentos*&tipo=neq.', 500)),
                    api(REST + '/youtube_videos?select=*&order=publicacao.desc&limit=50').catch(() => [])
                ])
                rRel = rRel.status === 'fulfilled' ? rRel.value : []
                rFat = rFat.status === 'fulfilled' ? rFat.value : []
                rDiv = rDiv.status === 'fulfilled' ? rDiv.value : []
                rVid = rVid.status === 'fulfilled' ? rVid.value : []

                data.rel = processFnet(rRel)
                data.fat = processFnet(rFat)
                data.div = processDiv(rDiv)
                data.vid = rVid.sort((a, b) => (b.publicacao || '').localeCompare(a.publicacao || ''))
                populateCanalFilter(data.vid)

                renderTables()
                hideSpinners()
                if (window.innerWidth >= 1000) document.querySelectorAll('.table-card').forEach(c => c.classList.add('is-open'))

            } catch (e) {
                console.error(e)
                console.log('Erro ao carregar dados')
                hideSpinners()
                for (let id of ['body-relatorios', 'body-fatos', 'body-dividendos']) {
                    document.getElementById(id).innerHTML = '<tr><td colspan="4" style="text-align:center;padding:30px;color:var(--text-muted)">Falha ao conectar com o servidor.</td></tr>'
                }
            }
        }

        async function loadFullData() {
            let btn = document.getElementById('btn-carregar-tudo')
            let icon = btn.querySelector('i')
            let txt = btn.querySelector('span')
            icon.className = 'fas fa-spinner spinner'
            txt.textContent = 'Carregando...'
            btn.disabled = true
            try {
                let sRel = qTudo(FNET_BASE, '&categoria_documento=like.*Relat*rio*')
                let sFat = qTudo(FNET_BASE, '&categoria_documento=like.*Fato*')
                let sDiv = qTudo(FNET_BASE + DIV_EXTRA, '&tipo_documento=like.*Rendimentos*&tipo=neq.')
                let [rRel, rFat, rDiv, rVid] = await Promise.allSettled([
                    apiAll(sRel), apiAll(sFat), apiAll(sDiv),
                    apiAll(REST + '/youtube_videos?select=*&order=publicacao.desc')
                ])
                rRel = rRel.status === 'fulfilled' ? rRel.value : []
                rFat = rFat.status === 'fulfilled' ? rFat.value : []
                rDiv = rDiv.status === 'fulfilled' ? rDiv.value : []
                rVid = rVid.status === 'fulfilled' ? rVid.value : []

                dataFull.rel = processFnet(rRel)
                dataFull.fat = processFnet(rFat)
                dataFull.div = processDiv(rDiv)
                dataFull.vid = rVid.sort((a, b) => (b.publicacao || '').localeCompare(a.publicacao || ''))
                fullLoaded = true
                populateCanalFilter(dataFull.vid)
                console.log('Base completa: rel=' + dataFull.rel.length + ' fat=' + dataFull.fat.length + ' rend=' + dataFull.div.length)

                btn.style.display = 'none'
                if (!searchActive) {
                    renderTables()
                }
            } catch (e) {
                console.error('Erro ao carregar base completa:', e)
                icon.className = 'fas fa-times'
                txt.textContent = 'Falhou'
                btn.disabled = false
            }
        }

        function fmtDate(d) {
            if (!d || isNaN(d.getTime())) return '-'
            return d.toLocaleDateString('pt-BR', { timeZone: 'UTC' })
        }
        function fmtDateStr(s) {
            if (!s) return '-'
            let p = s.slice(0, 10).split('-')
            if (p.length < 3) return '-'
            return p[2] + '/' + p[1] + '/' + p[0]
        }

        function fmtBRL(v) {
            if (v == null || v == '') return 'R$ 0,00'
            let n = typeof v === 'number' ? v : parseFloat(String(v).replace(/[R$\s]/g, '').replace(/\./g, '').replace(',', '.'))
            return isNaN(n) ? String(v) : n.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })
        }

        function populateDatalist() {
            let list = [...allCodes].sort()
            document.getElementById('fundos-list').innerHTML = list.map(x => '<option value="' + x + '">').join('')
            document.getElementById('filter-fundo').placeholder = 'Buscar por código (' + list.length + ' fundos)'
        }

        function renderVideos() {
            let f = document.getElementById('filter-fundo').value.toUpperCase().trim()
            let canalFilter = getSelectedCanais()
            let src = getDisplayData().vid
            let hoje = new Date().toLocaleDateString('pt-BR')
            let fi = src
            if (f) fi = fi.filter(d => (d.ticker || '').includes(f))
            if (canalFilter.length > 0) fi = fi.filter(d => canalFilter.includes(d.canal))
            document.getElementById('title-videos').innerHTML = '<i class="fab fa-youtube" style="color:var(--primary);font-size:15px"></i> Videos no YouTube (' + fi.length + ') <span id="header-badge-videos" class="badge-new hidden"></span>'
            let html = '', qtd = 0
            for (let d of fi) {
                let pub = d.publicacao
                let ehHoje = pub && fmtDateStr(pub) === hoje
                if (ehHoje) qtd++
                let cls = ehHoje ? ' class="row-today"' : ''
                html += '<tr' + cls + '><td>' + fmtDateStr(d.publicacao) + '</td><td><span class="ticker-link">' + d.ticker + '</span></td><td>' + d.canal + '</td><td class="truncate"><a href="' + d.link + '" target="_blank" class="ticker-link">' + d.titulo + '</a></td><td>' + d.duracao + '</td></tr>'
            }
            document.getElementById('body-videos').innerHTML = html || '<tr><td colspan="5" style="text-align:center;padding:30px;color:var(--text-muted)">Nenhum item.</td></tr>'
            let be = document.getElementById('header-badge-videos')
            if (qtd) { be.textContent = qtd; be.classList.remove('hidden') } else be.classList.add('hidden')
        }

        function renderTables() {
            let f = document.getElementById('filter-fundo').value.toUpperCase().trim()
            let src = getDisplayData()
            let arrRel = src.rel
            let arrFat = src.fat
            let arrDiv = src.div
            let hoje = new Date().toLocaleDateString('pt-BR')

            function render(src, tbodyId, titleId, badgeId, label, type) {
                let fi = !f ? src : src.filter(d => (d.fundo || '').includes(f))
                let iconMap={'Relatorios':'<i class=\"fas fa-file-alt\" style=\"color:var(--primary);font-size:15px\"></i> ','Fatos Relevantes':'<i class=\"fas fa-bolt\" style=\"color:var(--primary);font-size:15px\"></i> ','Rendimentos':'<i class=\"fas fa-money-bill-wave\" style=\"color:var(--primary);font-size:15px\"></i> '}
                document.getElementById(titleId).innerHTML = (iconMap[label]||'') + label + ' (' + fi.length + ') <span id="' + badgeId + '" class="badge-new hidden"></span>'
                let html = '', qtd = 0
                for (let d of fi) {
                    let pub = d.pubStr
                    let ehHoje = pub && fmtDateStr(pub) === hoje
                    if (ehHoje) qtd++
                    let cls = ehHoje ? ' class="row-today"' : ''
                    if (type === 'div') {
                        html += '<tr' + cls + '><td>' + (d.dataCom ? fmtDateStr(d.dataCom) : '-') + '</td><td>' + (d.link ? '<a href="' + d.link + '" target="_blank" class="ticker-link">' + d.fundo + '</a>' : '<span class="ticker-link">' + d.fundo + '</span>') + '</td><td>' + (d.dataPgto ? fmtDateStr(d.dataPgto) : '-') + '</td><td class="valor-destaque">' + fmtBRL(d.valor) + '</td></tr>'
                    } else {
                        html += '<tr' + cls + '><td>' + (d.pubStr ? fmtDateStr(d.pubStr) : '-') + '</td><td>' + (d.link ? '<a href="' + d.link + '" target="_blank" class="ticker-link">' + d.fundo + '</a>' : '<span class="ticker-link">' + d.fundo + '</span>') + '</td><td>' + (d.refStr ? fmtDateStr(d.refStr) : '-') + '</td></tr>'
                    }
                }
                let cols = type === 'div' ? 4 : 3
                document.getElementById(tbodyId).innerHTML = html || '<tr><td colspan="' + cols + '" style="text-align:center;padding:30px;color:var(--text-muted)">Nenhum item.</td></tr>'
                let be = document.getElementById(badgeId)
                if (qtd) { be.textContent = qtd; be.classList.remove('hidden') } else be.classList.add('hidden')
            }
            render(arrRel, 'body-relatorios', 'title-relatorios', 'header-badge-relatorios', 'Relatorios', 'std')
            render(arrFat, 'body-fatos', 'title-fatos', 'header-badge-fatos', 'Fatos Relevantes', 'std')
            render(arrDiv, 'body-dividendos', 'title-dividendos', 'header-badge-dividendos', 'Rendimentos', 'div')
            renderVideos()
        }

        document.addEventListener('click', function(e) {
            let dd = document.getElementById('canal-dropdown')
            let wrap = document.getElementById('canal-filter-wrap')
            if (dd && !dd.classList.contains('hidden') && wrap && !wrap.contains(e.target)) {
                dd.classList.add('hidden')
            }
        })
    </script>
