<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status da Base — Invest Ranking</title>
<meta name="description" content="Acompanhe o status da atualização dos dados de Fundos Imobiliários: B3, CVM, FNET, StatusInvest e YouTube.">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#111318;--card:#1a1d24;--border:#2a2e36;--text:#e2e5e9;--muted:#8a909a;--accent:#ffde59;--green:#2ec4b6;--red:#ee6363;--orange:#f5a623;--radius:8px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding:12px 16px 20px;-webkit-font-smoothing:antialiased;font-size:13px;overscroll-behavior:contain}
::selection{background:var(--accent);color:#000}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;padding-left:48px}
.topbar h1{font-size:17px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:5px}
.topbar h1 i{font-size:15px}
.actions{margin-left:auto;display:flex;gap:6px}
.btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:14px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:4px}
.btn:hover{border-color:var(--accent);color:var(--text)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning i{animation:spin .8s linear infinite}
.summary{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.summary span{font-size:12px;padding:3px 10px;border-radius:10px;font-weight:500}
.summary .ok{background:rgba(46,196,182,.12);color:var(--green)}
.summary .erro{background:rgba(238,99,99,.12);color:var(--red)}
.summary .skip{background:rgba(138,144,154,.12);color:var(--muted)}
.wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);background:var(--card)}
table{width:100%;border-collapse:collapse;white-space:nowrap;font-size:12px}
th{position:sticky;top:0;z-index:2;background:var(--card);padding:7px 6px;text-align:center;font-weight:500;color:var(--muted);border-bottom:1px solid var(--border);font-size:11px}
th:first-child{text-align:left;padding-left:10px;min-width:80px}
th:last-child{text-align:left;padding-right:10px}
td{padding:5px 6px;text-align:center;border-bottom:1px solid rgba(42,46,54,.5);vertical-align:middle}
td:first-child{text-align:left;padding-left:10px;font-size:11px;color:var(--muted)}
td:last-child{text-align:left;padding-right:10px}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;vertical-align:middle;transition:transform .15s}
.dot.ok{background:var(--green);box-shadow:0 0 6px rgba(46,196,182,.3)}
.dot.erro{background:var(--red);box-shadow:0 0 6px rgba(238,99,99,.3)}
.dot.skip{background:#555}
.dot.pend{background:var(--accent);box-shadow:0 0 6px rgba(255,222,89,.3)}
.dot-label{font-size:10px;color:var(--muted);margin-left:4px}
.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px}
.empty i{font-size:28px;display:block;margin-bottom:10px;opacity:.4}
.th-abbr{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);margin-top:1px}

@media(max-width:640px){
  body{padding:8px 6px 16px}
  th{font-size:10px;padding:6px 3px}
  th:first-child{padding-left:6px;min-width:60px}
  td{padding:4px 3px;font-size:11px}
  td:first-child{padding-left:6px}
  .dot{width:8px;height:8px}
}
</style>
</head>
<body>
<div class="topbar">
  <h1><i class="fas fa-sync-alt"></i> Status</h1>
  <div class="actions">
    <button class="btn" onclick="carregar()"><i class="fas fa-redo"></i> Recarregar</button>
  </div>
</div>
<div id="summary" class="summary"></div>
<div class="wrap">
  <div id="emptyState" class="empty">
    <i class="fas fa-database"></i>
    Nenhum registro. Execute <code style="color:var(--accent)">run_all.ps1</code>.
  </div>
  <div id="tableWrap"></div>
</div>

<script>
const REST='https://oaqmnaekrpukwmrxjtud.supabase.co/rest/v1'
const H={apikey:'sb_publishable_ekx47MbcOg-C1uoAPJnKWg_c9t9ndQR',Authorization:'Bearer sb_publishable_ekx47MbcOg-C1uoAPJnKWg_c9t9ndQR'}
const DISPLAY_COLS=[
  {id:'b3_live', abbr:'B3_Live', label:'B3 Ao Vivo', cols:['b3_aovivo']},
  {id:'b3_hist', abbr:'B3_Hist', label:'B3 Histórico', cols:['b3_cotahist']},
  {id:'fnet',    abbr:'FNET',    label:'FNET',          cols:['fnet_dados']},
  {id:'cvm',     abbr:'CVM',     label:'CVM',           cols:['cvm_fii','cvm_fiagro','cvm_cadastral']},
  {id:'st_acoes',abbr:'St_Ações',label:'StatusInvest Ações', cols:['status_acoes']},
  {id:'st_rend', abbr:'St_Rend', label:'StatusInvest Rendimentos', cols:['status_dividendos']},
]

function dotStatus(v){
  if(!v)return'pend'
  let l=v.toLowerCase()
  if(l.startsWith('ok'))return'ok'
  if(l.startsWith('erro'))return'erro'
  if(l.startsWith('skip'))return'skip'
  return'pend'
}

function dotCombined(row,cols){
  let sts=cols.map(c=>row[c]).filter(Boolean).map(dotStatus)
  if(!sts.length)return'pend'
  if(sts.some(s=>s==='erro'))return'erro'
  if(sts.every(s=>s==='ok'))return'ok'
  if(sts.every(s=>s==='skip'))return'skip'
  return'pend'
}

function dotHtml(status,title){
  return'<span class="dot '+status+'" title="'+title+'"></span>'
}

function parseDT(s){
  if(!s)return null
  return new Date(s.includes('T')?s:s.replace(' ','T'))
}

function fmtDateOnly(s){
  if(!s)return'—'
  let p=s.slice(0,10).split('-')
  return p.length<3?s:p[2]+'/'+p[1]+'/'+p[0]
}

function fmtTimeOnly(s){
  let t=parseDT(s)
  if(!t)return'—'
  return t.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})
}

function fmtFull(s){
  let t=parseDT(s)
  if(!t)return'—'
  return t.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+t.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})
}

async function carregar(){
  document.querySelector('.btn').classList.add('spinning')
  const tw=document.getElementById('tableWrap'),em=document.getElementById('emptyState')
  try{
    let r=await fetch(REST+'/00.log_atualizacao?select=*&order=id.desc&limit=30',{headers:H})
    if(!r.ok)throw new Error(r.status)
    let rows=await r.json()
    em.style.display=rows.length?'none':'block'
    if(!rows.length){document.querySelector('.btn').classList.remove('spinning');return}
    // summary
    let latest=rows[0]
    let counts={ok:0,erro:0,skip:0,pend:0}
    for(let d of DISPLAY_COLS){let st=dotCombined(latest,d.cols);counts[st]++}
    let sumHtml=''
    if(counts.ok)sumHtml+='<span class="ok">'+counts.ok+' OK</span>'
    if(counts.erro)sumHtml+='<span class="erro">'+counts.erro+' ERRO</span>'
    if(counts.skip)sumHtml+='<span class="skip">'+counts.skip+' SKIP</span>'
    if(counts.pend)sumHtml+='<span class="skip">'+counts.pend+' PEND</span>'
    sumHtml+='<span style="font-size:11px;color:var(--muted);margin-left:auto">Últ: '+fmtDateOnly(latest.finished_at)+'</span>'
    document.getElementById('summary').innerHTML=sumHtml
    // legend
    let legHtml='<div style="display:flex;gap:14px;margin-bottom:8px;font-size:11px;color:var(--muted)">'
    legHtml+='<span><span class="dot ok" style="margin-right:4px"></span> OK</span>'
    legHtml+='<span><span class="dot erro" style="margin-right:4px"></span> ERRO</span>'
    legHtml+='<span><span class="dot skip" style="margin-right:4px"></span> SKIP</span>'
    legHtml+='<span><span class="dot pend" style="margin-right:4px"></span> PEND</span>'
    legHtml+='</div>'
    // table
    let html=legHtml+'<table><thead><tr><th title="Execução">#</th>'
    for(let d of DISPLAY_COLS)html+='<th title="'+d.label+'">'+d.abbr+'</th>'
    html+='<th></th></tr></thead><tbody>'
    for(let i=0;i<rows.length;i++){
      let r=rows[i],num=rows.length-i
      html+='<tr><td title="'+fmtFull(r.finished_at)+'">#'+num+'</td>'
      for(let d of DISPLAY_COLS){
        let st=dotCombined(r,d.cols)
        html+='<td>'+dotHtml(st,d.label)+'</td>'
      }
      html+='<td style="font-size:10px;color:var(--muted)">'+fmtTimeOnly(r.finished_at)+'</td></tr>'
    }
    html+='</tbody></table>'
    tw.innerHTML=html
  }catch(e){
    tw.innerHTML='<div class="empty"><i class="fas fa-exclamation-triangle"></i> Erro: '+e.message+'</div>'
  }
  document.querySelector('.btn').classList.remove('spinning')
}
carregar()
setInterval(carregar,30000)

</script>
</body>
</html>
