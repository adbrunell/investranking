<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Status da Base — Invest Ranking</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;min-width:0}
:root{--bg:#111318;--card:#1a1d24;--border:#2a2e36;--text:#e2e5e9;--muted:#8a909a;--accent:#ffde59;--green:#2ec4b6;--red:#ee6363}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:#000}

.topbar{position:sticky;top:0;z-index:100;background:rgba(17,19,24,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:44px;display:flex;align-items:center;gap:8px;padding:0 20px 0 48px}
.topbar h1{font-size:17px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:6px}
.topbar h1 i{font-size:14px}
.topbar .actions{margin-left:auto;display:flex;gap:6px}
.btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:14px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:4px}
.btn:hover{border-color:var(--accent);color:var(--text)}

.summary-bar{display:flex;gap:8px;padding:8px 16px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border);background:var(--card)}
.summary-bar span{font-size:11px;padding:2px 8px;border-radius:8px;font-weight:500}
.summary-bar .ok{background:rgba(46,196,182,.12);color:var(--green)}
.summary-bar .erro{background:rgba(238,99,99,.12);color:var(--red)}
.summary-bar .skip{background:rgba(138,144,154,.12);color:var(--muted)}
.summary-bar .pend{background:rgba(255,222,89,.12);color:var(--accent)}
.summary-bar .info{color:var(--muted);font-size:11px;margin-left:auto}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 0;color:var(--muted);gap:10px}
.loading .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.container{max-width:900px;margin:0 auto;padding:0 16px 40px}

.date-group{margin-bottom:4px}

.wrap{overflow-x:auto;border:1px solid var(--border);border-radius:8px;background:var(--card)}
table{width:100%;border-collapse:collapse;white-space:nowrap;font-size:12px}
.date-row th{background:var(--card);padding:8px 5px;text-align:left;font-size:13px;font-weight:600;color:var(--text);border-bottom:0}
.date-row .day-label{color:var(--muted);font-weight:400;font-size:11px}
.date-row .count{font-weight:400;font-size:11px;color:var(--muted);float:right}
th{position:sticky;top:44px;z-index:48;background:var(--card);padding:6px 5px;text-align:center;font-weight:500;color:var(--muted);border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:.3px}
th:first-child{text-align:left;padding-left:10px;min-width:65px;position:sticky;left:0;z-index:51;background:var(--card)}
td{padding:5px 5px;text-align:center;border-bottom:1px solid rgba(42,46,54,.3);vertical-align:middle}
td:first-child{text-align:left;padding-left:10px;font-size:12px;color:var(--accent);font-weight:600;font-variant-numeric:tabular-nums;position:sticky;left:0;z-index:1;background:var(--bg)}
tr:hover td{background:rgba(255,255,255,.02)}
tr:hover td:first-child{background:var(--bg)}
tr:last-child td{border-bottom:none}

.dot{display:inline-block;width:10px;height:10px;border-radius:50%;vertical-align:middle}
.dot.ok{background:var(--green)}
.dot.erro{background:var(--red)}
.dot.skip{background:#555}
.dot.pend{background:var(--accent)}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state i{font-size:36px;opacity:.3;margin-bottom:10px}

@media(max-width:640px){
.topbar{height:auto;flex-wrap:wrap;padding:8px 14px 8px 48px;gap:6px}
.topbar h1{font-size:16px}
.container{padding:0 8px 30px}
th{font-size:9px;padding:4px 2px}
td{padding:4px 2px;font-size:11px}
td:first-child{font-size:11px;min-width:55px}
.dot{width:8px;height:8px}
.date-header{font-size:12px;padding:8px 0 4px}
}
</style>
</head>
<body>

<div class="topbar">
  <h1><i class="fas fa-sync-alt"></i> Status</h1>
  <div class="actions">
    <button class="btn" onclick="carregar()"><i class="fas fa-redo"></i> Recarregar</button>
  </div>
</div>

<div id="summaryBar" class="summary-bar"></div>

<div class="container">
  <div id="loading" class="loading" style="display:none"><div class="spinner"></div><span>Carregando...</span></div>
  <div id="emptyState" class="empty-state" style="display:none">
    <i class="fas fa-database"></i>
    <p>Nenhum registro. Execute <code style="color:var(--accent)">run_all.ps1</code>.</p>
  </div>
  <div id="feed"></div>
</div>

<script>
const REST='https://oaqmnaekrpukwmrxjtud.supabase.co/rest/v1'
const H={apikey:'sb_publishable_ekx47MbcOg-C1uoAPJnKWg_c9t9ndQR',Authorization:'Bearer sb_publishable_ekx47MbcOg-C1uoAPJnKWg_c9t9ndQR'}

const SCRIPTS=[
  {id:'b3_aovivo', label:'B3 Ao Vivo'},
  {id:'b3_cotahist', label:'B3 Hist.'},
  {id:'fnet_dados', label:'FNET'},
  {id:'youtube', label:'YouTube'},
  {id:'cvm_fii', label:'CVM FII'},
  {id:'cvm_fiagro', label:'CVM Fiagro'},
  {id:'cvm_cadastral', label:'CVM Cad.'},
  {id:'status_acoes', label:'St. Ações'},
  {id:'status_dividendos', label:'St. Div.'},
]

function dotStatus(v){
  if(!v)return'pend'
  let l=v.toLowerCase()
  if(l.startsWith('ok'))return'ok'
  if(l.startsWith('erro'))return'erro'
  if(l.startsWith('skip'))return'skip'
  return'pend'
}

function fmtTime(s){
  if(!s)return'—'
  let d=new Date(s.includes('T')?s:s.replace(' ','T'))
  return d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})
}

function fmtFull(s){
  if(!s)return'—'
  let d=new Date(s.includes('T')?s:s.replace(' ','T'))
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})
}

function dateKey(s){
  return s?s.slice(0,10):''
}

function fmtDateBR(key){
  if(!key)return''
  let p=key.split('-')
  if(p.length<3)return key
  return p[2]+'/'+p[1]+'/'+p[0]
}

function diaSemana(key){
  let p=key.split('-')
  if(p.length<3)return''
  let d=new Date(+p[0],+p[1]-1,+p[2])
  let dias=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb']
  return dias[d.getDay()]
}

async function carregar(){
  document.getElementById('loading').style.display='flex'
  document.getElementById('feed').innerHTML=''
  document.getElementById('emptyState').style.display='none'
  try{
    let r=await fetch(REST+'/log_atualizacao?select=*&order=id.desc&limit=200',{headers:H})
    if(!r.ok)throw new Error(r.status)
    let rows=await r.json()
    document.getElementById('loading').style.display='none'
    if(!rows.length){document.getElementById('emptyState').style.display='block';return}

    let latest=rows[0]
    let counts={ok:0,erro:0,skip:0}
    for(let s of SCRIPTS){let st=dotStatus(latest[s.id]);counts[st]=(counts[st]||0)+1}
    let sbHtml=''
    if(counts.ok)sbHtml+='<span class="ok">'+counts.ok+' OK</span>'
    if(counts.erro)sbHtml+='<span class="erro">'+counts.erro+' ERRO</span>'
    if(counts.skip)sbHtml+='<span class="skip">'+counts.skip+' SKIP</span>'
    let pen=SCRIPTS.length-(counts.ok||0)-(counts.erro||0)-(counts.skip||0)
    if(pen)sbHtml+='<span class="pend">'+pen+' PEND</span>'
    sbHtml+='<span class="info"><i class="far fa-clock"></i> '+fmtFull(latest.finished_at)+'</span>'
    document.getElementById('summaryBar').innerHTML=sbHtml

    let groups={}
    for(let r of rows){
      let k=dateKey(r.finished_at||r.started_at)
      if(!groups[k])groups[k]=[]
      groups[k].push(r)
    }

    let keys=Object.keys(groups).sort().reverse()
    let feedHtml=''

    for(let ki=0;ki<keys.length;ki++){
      let k=keys[ki],items=groups[k]
      feedHtml+='<div class="date-group">'
      feedHtml+='<div class="wrap"><table><thead>'
      feedHtml+='<tr class="date-row"><th colspan="'+(SCRIPTS.length+1)+'">'+fmtDateBR(k)+' <span class="day-label">'+diaSemana(k)+'</span><span class="count">'+items.length+' execuções</span></th></tr>'
      feedHtml+='<tr><th>Horário</th>'
      for(let s of SCRIPTS)feedHtml+='<th title="'+s.label+'">'+s.label+'</th>'
      feedHtml+='</tr></thead><tbody>'
      for(let r of items){
        let t=r.finished_at||r.started_at||''
        feedHtml+='<tr><td title="'+fmtFull(t)+'">'+fmtTime(t)+'</td>'
        for(let s of SCRIPTS){
          let st=dotStatus(r[s.id])
          feedHtml+='<td><span class="dot '+st+'" title="'+s.label+': '+(r[s.id]||'pendente')+'"></span></td>'
        }
        feedHtml+='</tr>'
      }
      feedHtml+='</tbody></table></div></div>'
    }
    document.getElementById('feed').innerHTML=feedHtml
  }catch(e){
    document.getElementById('loading').style.display='none'
    document.getElementById('feed').innerHTML='<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Erro: '+e.message+'</p></div>'
  }
}

carregar()
setInterval(carregar,30000)
</script>
</body>
</html>
