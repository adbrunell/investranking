<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Status da Base — Invest Ranking</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;min-width:0}
:root{--bg:#111318;--card:#1a1d24;--card2:#1f232b;--border:#2a2e36;--text:#e2e5e9;--muted:#8a909a;--accent:#ffde59;--green:#2ec4b6;--red:#ee6363;--orange:#f5a623;--blue:#4285F4;--radius:12px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
::selection{background:var(--accent);color:#000}

.topbar{position:sticky;top:0;z-index:100;background:rgba(17,19,24,0.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:44px;display:flex;align-items:center;gap:8px;padding:0 20px 0 48px}
.topbar h1{font-size:17px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:6px}
.topbar h1 i{font-size:14px}
.topbar .actions{margin-left:auto;display:flex;gap:6px}
.btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:14px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:4px}
.btn:hover{border-color:var(--accent);color:var(--text)}

.summary-bar{display:flex;gap:8px;padding:8px 16px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border);background:var(--card)}
.summary-bar span{font-size:11px;padding:2px 8px;border-radius:8px;font-weight:500}
.summary-bar .ok{background:rgba(46,196,182,.12);color:var(--green)}
.summary-bar .erro{background:rgba(238,99,99,.12);color:var(--red)}
.summary-bar .skip{background:rgba(138,144,154,.12);color:var(--muted)}
.summary-bar .pend{background:rgba(255,222,89,.12);color:var(--accent)}
.summary-bar .info{color:var(--muted);font-size:11px;margin-left:auto}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 0;color:var(--muted);gap:10px}
.loading .spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.container{max-width:800px;margin:0 auto;padding:0 16px 40px}

.date-group{margin-bottom:2px}
.date-header{position:sticky;top:44px;z-index:50;background:var(--bg);padding:10px 0 6px;font-size:12px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);margin-bottom:6px}
.date-header .date-badge{background:rgba(255,255,255,0.04);border:1px solid var(--border);padding:2px 10px;border-radius:10px;font-size:12px;color:var(--text);font-weight:600;margin-left:auto}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:4px;display:flex;align-items:stretch;transition:border .2s;overflow:hidden}
.card:hover{border-color:rgba(255,255,255,0.15)}
.card-side{width:3px;flex-shrink:0}
.card-side.ok{background:var(--green)}
.card-side.erro{background:var(--red)}
.card-side.skip{background:#555}
.card-side.pend{background:var(--accent)}
.card-body{flex:1;padding:10px 14px;min-width:0}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.card-time{font-size:15px;font-weight:600;color:var(--accent);white-space:nowrap;font-variant-numeric:tabular-nums}
.card-label{font-size:10px;color:var(--muted);white-space:nowrap}
.card-label i{margin-right:3px}
.card-dots{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.dot-group{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot.ok{background:var(--green)}
.dot.erro{background:var(--red)}
.dot.skip{background:#555}
.dot.pend{background:var(--accent)}
.dot-label{font-size:10px;color:var(--muted);white-space:nowrap}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state i{font-size:36px;opacity:.3;margin-bottom:10px}

@media(max-width:640px){
.topbar{height:auto;flex-wrap:wrap;padding:8px 14px 8px 48px;gap:6px}
.topbar h1{font-size:16px}
.container{padding:0 10px 30px}
.card-body{padding:8px 10px}
.card-time{font-size:14px}
.card-dots{gap:6px}
.dot{width:8px;height:8px}
.dot-group{font-size:9px}
}
</style>
</head>
<body>

<div class="topbar">
  <h1><i class="fas fa-sync-alt"></i> Status</h1>
  <div class="actions">
    <button class="btn" onclick="carregar()"><i class="fas fa-redo"></i> Recarregar</button>
  </div>
</div>

<div id="summaryBar" class="summary-bar"></div>

<div class="container">
  <div id="loading" class="loading" style="display:none"><div class="spinner"></div><span>Carregando...</span></div>
  <div id="emptyState" class="empty-state" style="display:none">
    <i class="fas fa-database"></i>
    <p>Nenhum registro. Execute <code style="color:var(--accent)">run_all.ps1</code>.</p>
  </div>
  <div id="feed"></div>
</div>

<script>
const REST='https://oaqmnaekrpukwmrxjtud.supabase.co/rest/v1'
const H={apikey:'sb_publishable_ekx47MbcOg-C1uoAPJnKWg_c9t9ndQR',Authorization:'Bearer sb_publishable_ekx47MbcOg-C1uoAPJnKWg_c9t9ndQR'}

const SCRIPTS=[
  {id:'b3_aovivo', label:'B3 Ao Vivo'},
  {id:'b3_cotahist', label:'B3 Histórico'},
  {id:'fnet_dados', label:'FNET'},
  {id:'youtube', label:'YouTube'},
  {id:'cvm_fii', label:'CVM FII'},
  {id:'cvm_fiagro', label:'CVM Fiagro'},
  {id:'cvm_cadastral', label:'CVM Cadastral'},
  {id:'status_acoes', label:'St. Ações'},
  {id:'status_dividendos', label:'St. Dividendos'},
]

const DIAS={0:'Dom',1:'Seg',2:'Ter',3:'Qua',4:'Qui',5:'Sex',6:'Sáb'}

function dotStatus(v){
  if(!v)return'pend'
  let l=v.toLowerCase()
  if(l.startsWith('ok'))return'ok'
  if(l.startsWith('erro'))return'erro'
  if(l.startsWith('skip'))return'skip'
  return'pend'
}

function overallStatus(row){
  for(let s of SCRIPTS){let st=dotStatus(row[s.id]);if(st==='erro')return'erro'}
  for(let s of SCRIPTS){let st=dotStatus(row[s.id]);if(st==='pend')return'pend'}
  for(let s of SCRIPTS){let st=dotStatus(row[s.id]);if(st==='skip')return'skip'}
  return'ok'
}

function fmtTime(s){
  if(!s)return'—'
  let d=new Date(s.includes('T')?s:s.replace(' ','T'))
  return d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})
}

function fmtDate(s){
  if(!s)return'—'
  let p=s.slice(0,10).split('-')
  return p[2]+'/'+p[1]
}

function fmtFull(s){
  if(!s)return'—'
  let d=new Date(s.includes('T')?s:s.replace(' ','T'))
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})
}

function dateKey(s){
  return s?s.slice(0,10):''
}

function hojeKey(){
  return new Date().toISOString().slice(0,10)
}

function labelDia(key){
  if(!key)return''
  let p=key.split('-')
  if(p.length<3)return key
  let d=new Date(+p[0],+p[1]-1,+p[2])
  let hoje=dateKey(new Date().toISOString())
  let ontem=dateKey(new Date(Date.now()-86400000).toISOString())
  if(key===hoje)return'Hoje'
  if(key===ontem)return'Ontem'
  return DIAS[d.getDay()]+' — '+p[2]+'/'+p[1]
}

async function carregar(){
  document.getElementById('loading').style.display='flex'
  document.getElementById('feed').innerHTML=''
  document.getElementById('emptyState').style.display='none'
  try{
    let r=await fetch(REST+'/log_atualizacao?select=*&order=id.desc&limit=200',{headers:H})
    if(!r.ok)throw new Error(r.status)
    let rows=await r.json()
    document.getElementById('loading').style.display='none'
    if(!rows.length){document.getElementById('emptyState').style.display='block';return}

    let latest=rows[0]
    let counts={ok:0,erro:0,skip:0}
    for(let s of SCRIPTS){let st=dotStatus(latest[s.id]);counts[st]=(counts[st]||0)+1}
    let sbHtml=''
    if(counts.ok)sbHtml+='<span class="ok">'+counts.ok+' OK</span>'
    if(counts.erro)sbHtml+='<span class="erro">'+counts.erro+' ERRO</span>'
    if(counts.skip)sbHtml+='<span class="skip">'+counts.skip+' SKIP</span>'
    let pen=SCRIPTS.length-(counts.ok||0)-(counts.erro||0)-(counts.skip||0)
    if(pen)sbHtml+='<span class="pend">'+pen+' PEND</span>'
    sbHtml+='<span class="info"><i class="far fa-clock"></i> '+fmtFull(latest.finished_at)+'</span>'
    document.getElementById('summaryBar').innerHTML=sbHtml

    let groups={}
    for(let r of rows){
      let k=dateKey(r.finished_at||r.started_at)
      if(!groups[k])groups[k]=[]
      groups[k].push(r)
    }

    let keys=Object.keys(groups).sort().reverse()
    let hoje=hojeKey()
    let feedHtml=''

    for(let ki=0;ki<keys.length;ki++){
      let k=keys[ki],items=groups[k]
      feedHtml+='<div class="date-group">'
      feedHtml+='<div class="date-header">'+labelDia(k)+(k===hoje?' <span style="color:var(--accent);font-size:10px">· ao vivo</span>':'')+'<span class="date-badge">'+items.length+' execuções</span></div>'
      for(let r of items){
        let ov=overallStatus(r)
        let t=r.finished_at||r.started_at||''
        feedHtml+='<div class="card" title="'+fmtFull(t)+'">'
        feedHtml+='<div class="card-side '+ov+'"></div>'
        feedHtml+='<div class="card-body">'
        feedHtml+='<div class="card-top"><span class="card-time">'+fmtTime(t)+'</span></div>'
        feedHtml+='<div class="card-dots">'
        for(let s of SCRIPTS){
          let st=dotStatus(r[s.id])
          feedHtml+='<span class="dot-group"><span class="dot '+st+'" title="'+s.label+': '+(r[s.id]||'pendente')+'"></span><span class="dot-label">'+s.label+'</span></span>'
        }
        feedHtml+='</div></div></div>'
      }
      feedHtml+='</div>'
    }
    document.getElementById('feed').innerHTML=feedHtml
  }catch(e){
    document.getElementById('loading').style.display='none'
    document.getElementById('feed').innerHTML='<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Erro: '+e.message+'</p></div>'
  }
}

carregar()
setInterval(carregar,30000)
</script>
</body>
</html>
