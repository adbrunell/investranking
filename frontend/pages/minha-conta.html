<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Minha Conta</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;min-width:0}
:root{--bg:#0c0e12;--card:#14171d;--card2:#1a1e26;--border:#232830;--text:#e8ecf1;--muted:#7a8290;--accent:#ffde59;--green:#00c896;--red:#ff4757;--radius:10px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:var(--accent);color:#000}

.topbar{position:sticky;top:0;z-index:100;background:rgba(12,14,18,0.88);backdrop-filter:blur(18px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px 0 48px;height:48px}
.topbar h1{font-size:17px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:7px}

.container{max-width:480px;margin:0 auto;padding:16px 12px 40px}

.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
.card-title{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.field{margin-bottom:12px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:11px;color:var(--muted);font-weight:600;margin-bottom:4px}
.field select,.field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13px;outline:none;font-family:inherit;transition:border .2s}
.field select:focus,.field input:focus{border-color:var(--accent)}
.field select option{background:var(--card2);color:var(--text)}

.save-bar{position:sticky;bottom:0;background:rgba(12,14,18,0.92);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:12px 16px}
.save-bar button{width:100%;background:var(--accent);border:none;color:#000;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s}
.save-bar button:hover{opacity:.85}
.save-bar button:disabled{opacity:.4;cursor:default}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:8px;font-size:12px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.error{color:var(--red);border-color:rgba(255,71,87,.3)}

.login-msg{text-align:center;padding:60px 20px}
.login-msg i{font-size:36px;opacity:.3;margin-bottom:10px;display:block}
.login-msg p{color:var(--muted);font-size:13px;margin-bottom:16px}
.login-msg a{color:var(--accent);text-decoration:none;font-weight:600}
</style>
</head>
<body>

<div class="topbar">
  <h1><i class="fas fa-user"></i> Minha Conta</h1>
</div>

<div class="container" id="pageContent">
  <div class="login-msg" id="loginMsg">
    <i class="fas fa-lock"></i>
    <p>Faça login para acessar suas configurações.</p>
    <a href="login.html">Ir para Login</a>
  </div>

  <div id="profileForm" style="display:none">
    <div class="card">
      <div class="card-title"><i class="fas fa-id-card"></i> Informações Pessoais</div>
      <div class="field">
        <label>Nome Completo</label>
        <input type="text" id="inputNome" placeholder="Seu nome" maxlength="120">
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="inputEmail" disabled style="opacity:.5">
      </div>
      <div class="field">
        <label>Estado</label>
        <select id="inputEstado" onchange="carregarCidades()">
          <option value="">Selecione o estado</option>
        </select>
      </div>
      <div class="field">
        <label>Cidade</label>
        <select id="inputCidade">
          <option value="">Selecione a cidade</option>
        </select>
      </div>
    </div>

    <div class="card">
      <div class="card-title"><i class="fas fa-shield-alt"></i> Autenticação</div>
      <div class="field">
        <label>Senha Atual</label>
        <input type="password" id="inputSenhaAtual" placeholder="Preencha para alterar a senha">
      </div>
      <div class="field">
        <label>Nova Senha</label>
        <input type="password" id="inputNovaSenha" placeholder="Nova senha (mín. 6 caracteres)">
      </div>
    </div>
  </div>
</div>

<div class="save-bar" id="saveBar" style="display:none">
  <button id="btnSalvar" onclick="salvar()"><i class="fas fa-check"></i> Salvar</button>
</div>

<div class="toast" id="toast"></div>

<script>
const ESTADOS_BR = [
  'AC','AL','AP','AM','BA','CE','DF','ES','GO','MA','MT','MS','MG',
  'PA','PB','PR','PE','PI','RJ','RN','RS','RO','RR','SC','SP','SE','TO'
]
const CIDADES = {
  AC:['Rio Branco'], AL:['Maceió'], AP:['Macapá'], AM:['Manaus'],
  BA:['Salvador','Feira de Santana','Vitória da Conquista','Camaçari','Itabuna','Juazeiro','Lauro de Freitas','Ilhéus','Porto Seguro','Barreiras'],
  CE:['Fortaleza','Caucaia','Juazeiro do Norte','Maracanaú','Sobral','Crato'],
  DF:['Brasília'],
  ES:['Vitória','Vila Velha','Serra','Cariacica','Linhares','Colatina'],
  GO:['Goiânia','Aparecida de Goiânia','Anápolis','Rio Verde','Luziânia'],
  MA:['São Luís','Imperatriz','Timon'],
  MT:['Cuiabá','Várzea Grande','Rondonópolis','Sinop'],
  MS:['Campo Grande','Dourados'],
  MG:['Belo Horizonte','Uberlândia','Contagem','Juiz de Fora','Betim','Montes Claros','Uberaba','Ribeirão das Neves','Governador Valadares','Ipatinga','Divinópolis','Poços de Caldas'],
  PA:['Belém','Ananindeua','Santarém','Marabá'],
  PB:['João Pessoa','Campina Grande'],
  PR:['Curitiba','Londrina','Maringá','Ponta Grossa','Cascavel','São José dos Pinhais','Foz do Iguaçu'],
  PE:['Recife','Jaboatão dos Guararapes','Olinda','Caruaru','Petrolina','Paulista'],
  PI:['Teresina','Parnaíba'],
  RJ:['Rio de Janeiro','Niterói','Duque de Caxias','Nova Iguaçu','Campos dos Goytacazes','Petrópolis','Volta Redonda','Macaé','Angra dos Reis','Resende'],
  RN:['Natal','Mossoró','Parnamirim'],
  RS:['Porto Alegre','Caxias do Sul','Pelotas','Canoas','Santa Maria','Novo Hamburgo','Passo Fundo','Rio Grande'],
  RO:['Porto Velho','Ji-Paraná'],
  RR:['Boa Vista'],
  SC:['Florianópolis','Joinville','Blumenau','São José','Chapecó','Criciúma','Itajaí'],
  SP:['São Paulo','Guarulhos','Campinas','São Bernardo do Campo','Santo André','Osasco','Sorocaba','Ribeirão Preto','Santos','São José dos Campos','Jundiaí','Bauru','Piracicaba','Franca','São José do Rio Preto','Mogi das Cruzes','Taubaté','Marília','Presidente Prudente','Americana'],
  SE:['Aracaju','Nossa Senhora do Socorro'],
  TO:['Palmas','Araguaína']
}

let toastTimer

function mostrarToast(msg, isError){
  const el=document.getElementById('toast')
  el.textContent=msg;el.classList.toggle('error',!!isError)
  el.classList.add('show')
  clearTimeout(toastTimer)
  toastTimer=setTimeout(()=>el.classList.remove('show'),3000)
}

async function init(){
  try{
    const sess=await getSession()
    if(!sess?.data?.session){
      document.getElementById('loginMsg').style.display='block'
      document.getElementById('profileForm').style.display='none'
      document.getElementById('saveBar').style.display='none'
      return
    }
    document.getElementById('loginMsg').style.display='none'
    document.getElementById('profileForm').style.display='block'
    document.getElementById('saveBar').style.display='block'

    document.getElementById('inputEmail').value=sess.data.session.user.email||''

    // Carregar estados
    const selEstado=document.getElementById('inputEstado')
    ESTADOS_BR.forEach(uf=>{
      const o=document.createElement('option')
      o.value=uf;o.textContent=uf
      selEstado.appendChild(o)
    })

    // Carregar perfil
    try{
      const perfil=await getProfile()
      if(perfil){
        document.getElementById('inputNome').value=perfil.nome||''
        document.getElementById('inputEstado').value=perfil.estado||''
        if(perfil.estado)carregarCidades(perfil.cidade||'')
      }
    }catch(e){}
  }catch(e){
    mostrarToast('Erro ao carregar: '+e.message,true)
  }
}

function carregarCidades(selecionada){
  const uf=document.getElementById('inputEstado').value
  const sel=document.getElementById('inputCidade')
  sel.innerHTML='<option value="">Selecione a cidade</option>'
  if(!uf||!CIDADES[uf])return
  CIDADES[uf].forEach(c=>{
    const o=document.createElement('option')
    o.value=c;o.textContent=c
    if(c===selecionada)o.selected=true
    sel.appendChild(o)
  })
}

async function salvar(){
  const btn=document.getElementById('btnSalvar')
  btn.disabled=true;btn.textContent='Salvando...'

  const nome=document.getElementById('inputNome').value.trim()
  const estado=document.getElementById('inputEstado').value
  const cidade=document.getElementById('inputCidade').value
  const senhaAtual=document.getElementById('inputSenhaAtual').value
  const novaSenha=document.getElementById('inputNovaSenha').value

  try{
    // Salvar perfil
    await upsertProfile({nome,estado,cidade})
    mostrarToast('Informações salvas!')

    // Alterar senha se preenchido
    if(senhaAtual&&novaSenha){
      if(novaSenha.length<6)throw new Error('Nova senha deve ter no mínimo 6 caracteres')
      await updatePassword(senhaAtual,novaSenha)
      document.getElementById('inputSenhaAtual').value=''
      document.getElementById('inputNovaSenha').value=''
      mostrarToast('Senha alterada com sucesso!')
    }
  }catch(e){
    mostrarToast(e.message,true)
  }

  btn.disabled=false;btn.textContent='Salvar'
}

init()
</script>
<script defer src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script defer src="../js/supabase.js"></script>
</body>
</html>
