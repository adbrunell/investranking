<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Cotações de FIIs — Invest Ranking</title>
<meta name="description" content="Cotações em tempo real de Fundos Imobiliários com variação, preço atual e indicadores. Acompanhe o mercado de FIIs.">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;min-width:0}
:root{--bg:#0c0e12;--card:#14171d;--card2:#1a1e26;--border:#232830;--text:#e8ecf1;--muted:#7a8290;--accent:#ffde59;--green:#00c896;--red:#ff4757;--blue:#5b7fff;--orange:#ff9f43;--radius:14px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
::selection{background:var(--accent);color:#000}

.topbar{position:sticky;top:0;z-index:100;background:rgba(12,14,18,0.88);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px 0 48px;height:48px;gap:10px}
.topbar h1{font-size:17px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:7px;white-space:nowrap}
.topbar h1 small{font-size:11px;font-weight:400;color:var(--muted)}
.topbar .top-right{display:flex;align-items:center;gap:8px}
.status-market{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:16px;font-size:11px;font-weight:600;white-space:nowrap;transition:all .3s}
.status-market.open{background:rgba(0,200,150,0.12);color:var(--green);border:1px solid rgba(0,200,150,0.25)}
.status-market.closed{background:rgba(255,255,255,0.04);color:var(--muted);border:1px solid var(--border)}
.status-market .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.status-market.open .dot{background:var(--green);animation:pulse-market 1.5s ease-in-out infinite}
.status-market.closed .dot{background:var(--muted)}
@keyframes pulse-market{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.65)}}

.search-box{position:relative;width:180px}
.search-box input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 12px 6px 30px;color:var(--text);font-size:12px;outline:none;font-family:inherit;transition:border .25s}
.search-box input:focus{border-color:var(--accent);background:var(--card2)}
.search-box input::placeholder{color:var(--muted)}
.search-box svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:var(--muted);pointer-events:none}
.search-box .clear-btn{position:absolute;right:5px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;display:none;padding:3px 5px;font-size:11px;opacity:.6}
.search-box.has-text .clear-btn{display:block}

.filters-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;border-bottom:1px solid var(--border);background:var(--card)}
.filters-wrap::-webkit-scrollbar{display:none}
.filters{display:flex;gap:5px;padding:7px 16px;max-width:1100px;margin:0 auto;align-items:center}
.mode-group{display:flex;gap:2px;background:rgba(255,255,255,0.04);border-radius:20px;padding:2px;border:1px solid rgba(255,255,255,0.06);flex-shrink:0}
.mode-btn{background:transparent;border:none;color:var(--muted);padding:5px 14px;border-radius:18px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;font-weight:500}
.mode-btn:hover{color:var(--text)}
.mode-btn.active{background:var(--accent);color:#000;box-shadow:0 2px 8px rgba(255,222,89,0.3)}
.mode-btn:active{transform:scale(.92)}
.asset-divider{width:1px;height:22px;background:var(--border);flex-shrink:0;margin:0 4px}
.asset-group{display:flex;gap:3px;flex-wrap:nowrap}
.asset-chip{background:transparent;border:1px solid var(--border);color:var(--muted);padding:4px 11px;border-radius:14px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .25s;white-space:nowrap;flex-shrink:0}
.asset-chip:hover{border-color:var(--text);color:var(--text)}
.asset-chip.active{background:var(--accent);color:#000;border-color:var(--accent)}
.asset-chip:active{transform:scale(.93)}

.rank-meta{font-size:10px;color:var(--muted);margin-top:1px;width:100%}

.container{max-width:1100px;margin:0 auto;padding:8px 16px 40px}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 0;color:var(--muted);gap:12px}
.loading .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.rank-card{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:5px;cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1);animation:cardIn .45s ease-out both;position:relative;overflow:hidden}
.rank-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;opacity:0;transition:opacity .3s}
.rank-card.up::before{background:var(--green);opacity:1}
.rank-card.down::before{background:var(--red);opacity:1}
.rank-card:hover{border-color:rgba(255,255,255,0.15);transform:translateX(4px);background:var(--card2)}
.rank-card:active{transform:scale(.98)}
@keyframes cardIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}

.rank-pos{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;background:rgba(255,255,255,0.04);color:var(--muted);transition:all .3s}
.rank-card:first-child .rank-pos,.rank-card:nth-child(2) .rank-pos,.rank-card:nth-child(3) .rank-pos{font-size:14px}
.rank-card:first-child .rank-pos{background:linear-gradient(135deg,#ffd700,#f0c000);color:#000;box-shadow:0 2px 12px rgba(255,215,0,0.3)}
.rank-card:nth-child(2) .rank-pos{background:linear-gradient(135deg,#c0c0c0,#a8a8a8);color:#000;box-shadow:0 2px 10px rgba(192,192,192,0.25)}
.rank-card:nth-child(3) .rank-pos{background:linear-gradient(135deg,#cd7f32,#b8722d);color:#fff;box-shadow:0 2px 10px rgba(205,127,50,0.25)}

.rank-body{flex:1;min-width:0;display:flex;flex-direction:column;align-items:flex-start;gap:2px}
.rank-ticker{font-size:15px;font-weight:600;color:var(--accent);text-decoration:none;white-space:nowrap}
.rank-ticker:hover{text-decoration:underline}
.rank-seg{font-size:9px;padding:1px 6px;border-radius:4px;background:rgba(255,255,255,0.05);color:var(--muted);font-weight:500;white-space:nowrap}
.rank-price{font-size:15px;font-weight:600;color:var(--accent);white-space:nowrap;padding:0 12px;flex-shrink:0}

.rank-variacao{flex-shrink:0;min-width:70px;text-align:right}
.rank-variacao .pct{font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;transition:color .3s}
.rank-variacao .pct.up{color:var(--green)}
.rank-variacao .pct.down{color:var(--red)}

.rank-volume{flex-shrink:0;min-width:80px;text-align:right}
.rank-volume .vol-num{font-size:15px;font-weight:600;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state i{font-size:40px;opacity:.3;margin-bottom:12px}

.mode-volume .rank-variacao{display:none}
.mode-volume .rank-volume{display:flex}
#treemap{display:none;width:100%;min-height:400px;position:relative}
body.mode-treemap .rank-card{display:none}
body.mode-treemap .rank-variacao{display:none}
body.mode-treemap .rank-volume{display:none}
body.mode-treemap #treemap{display:block}
#treemap svg{display:block;width:100%;height:100%}
.tm-tile{cursor:pointer}
.tm-tile:hover rect{stroke:rgba(255,255,255,0.3);stroke-width:1.5}
.tm-tile text{pointer-events:none;user-select:none;font-weight:500;font-family:'Segoe UI',system-ui,sans-serif}
.tm-empty{display:flex;align-items:center;justify-content:center;min-height:400px;color:var(--muted);font-size:14px;flex-direction:column;gap:8px}

@media(max-width:768px){
.topbar{padding:0 12px 0 48px;height:auto;min-height:44px;gap:4px;flex-wrap:wrap}
.topbar h1{font-size:14px;gap:4px}
.topbar .top-right{gap:4px}
.status-market{padding:2px 7px;font-size:10px}
.search-box{width:130px}
.search-box input{font-size:11px;padding:5px 10px 5px 26px}
.search-box svg{width:11px;height:11px;left:7px}
.filters{padding:5px 10px;gap:4px}
.mode-btn{padding:4px 10px;font-size:11px}
.asset-chip{padding:3px 8px;font-size:9px}
.mode-btn{padding:3px 8px;font-size:10px}
.mode-group{gap:1px;padding:1px}
.container{padding:6px 10px 30px}
.rank-card{padding:10px 12px;gap:8px}
.rank-pos{width:26px;height:26px;font-size:11px}
.rank-ticker{font-size:13px}
.rank-price{font-size:13px}
.rank-meta{font-size:9px}
.rank-variacao .pct{font-size:13px;min-width:50px}
.rank-variacao{min-width:55px}
.rank-volume{min-width:60px}
.rank-volume .vol-num{font-size:13px}
}
@media(max-width:480px){
.rank-variacao{min-width:45px}
.search-box{width:90px}
.status-market{padding:2px 5px;font-size:9px;border-radius:12px;gap:3px}
}
</style>
</head>
<body>

<div class="topbar">
  <h1><i class="fas fa-chart-simple" style="font-size:14px"></i> Ranking</h1>
  <div class="top-right">
    <div class="status-market" id="statusMarket"><span class="dot"></span><span id="statusLabel">—</span></div>
    <div class="search-box" id="searchBox">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" placeholder="Buscar ticker..." oninput="onSearch()" autocomplete="off">
      <button class="clear-btn" onclick="clearSearch()"><i class="fas fa-times"></i></button>
    </div>
  </div>
</div>

<div class="filters-wrap">
  <div class="filters" id="filters">
    <div class="mode-group">
      <button class="mode-btn active" data-mode="altas" onclick="setMode(this)"><i class="fas fa-arrow-up" style="font-size:10px"></i> Altas</button>
      <button class="mode-btn" data-mode="baixas" onclick="setMode(this)"><i class="fas fa-arrow-down" style="font-size:10px"></i> Baixas</button>
      <button class="mode-btn" data-mode="volume" onclick="setMode(this)"><i class="fas fa-water-chart" style="font-size:10px"></i> Volume</button>
      <button class="mode-btn" data-mode="treemap" onclick="setMode(this)"><i class="fas fa-th" style="font-size:10px"></i> Mapa</button>
    </div>
    <div class="asset-divider"></div>
    <div class="asset-group" id="assetGroup">
      <button class="asset-chip all active" data-asset="acao" onclick="toggleAsset(this)"><i class="fas fa-building" style="font-size:9px"></i> Ações</button>
      <button class="asset-chip active" data-asset="fii" onclick="toggleAsset(this)"><i class="fas fa-home" style="font-size:9px"></i> FIIs</button>
      <button class="asset-chip active" data-asset="fiagro" onclick="toggleAsset(this)"><i class="fas fa-seedling" style="font-size:9px"></i> Fiagro</button>
      <button class="asset-chip active" data-asset="fiinfra" onclick="toggleAsset(this)"><i class="fas fa-plug" style="font-size:9px"></i> FI-Infra</button>
    </div>
  </div>
</div>

<div class="container">
  <div id="loading" class="loading"><div class="spinner"></div><span>Carregando cotações...</span></div>
  <div id="feed"></div>
  <div id="treemap"></div>
</div>

<script>
const REST='https://oaqmnaekrpukwmrxjtud.supabase.co/rest/v1'
const H={apikey:'sb_publishable_ekx47MbcOg-C1uoAPJnKWg_c9t9ndQR',Authorization:'Bearer sb_publishable_ekx47MbcOg-C1uoAPJnKWg_c9t9ndQR'}

let mode='altas',searchTerm=''
let allItems=[]
let assetFilter={acao:true,fii:true,fiagro:true,fiinfra:true}
const ASSET_MAP={Ação:'acao',Tijolo:'fii',Papel:'fii',FoF:'fii',Híbrido:'fii','FIP-IE':'fii',Fiagro:'fiagro','FI-Infra':'fiinfra'}

function fmtNum(n){
  if(n==null||isNaN(n))return'—'
  return n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})
}
function fmtVolume(n){
  if(n==null||isNaN(n))return'—'
  if(n>=1e9)return(n/1e9).toFixed(1)+' bi'
  if(n>=1e6)return(n/1e6).toFixed(1)+' mi'
  if(n>=1e3)return(n/1e3).toFixed(0)+' mil'
  return n.toFixed(0)
}
function fmtShort(n){
  if(n==null||isNaN(n))return'—'
  return n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})
}

function pDate(s){
  if(!s)return null
  let d=new Date(s);return isNaN(d.getTime())?null:d
}
function fmtDateTime(dateStr,timeStr){
  if(!dateStr)return''
  let p=dateStr.slice(0,10).split('-')
  if(p.length<3)return''
  let dd=p[2],mm=p[1],yy=p[0]
  let t=timeStr||''
  let parts=t.split(':')
  if(parts.length===3){t=parts[0]+':'+parts[1]}
  else if(parts.length===2){t=parts[0]+':'+parts[1]}
  else{t='--:--'}
  return dd+'/'+mm+'/'+yy+' '+t
}

function updateMarketStatus(){
  let el=document.getElementById('statusMarket'),lb=document.getElementById('statusLabel')
  try{
    let now=new Date()
    let br=new Date(now.toLocaleString('en-US',{timeZone:'America/Sao_Paulo'}))
    let h=br.getHours(),m=br.getMinutes(),d=br.getDay()
    let mins=h*60+m
    let open=d>=1&&d<=5&&mins>=600&&mins<1020
    if(open){el.className='status-market open';lb.textContent='MERCADO ABERTO'}
    else{el.className='status-market closed';lb.textContent='MERCADO FECHADO'}
  }catch(e){
    el.className='status-market closed';lb.textContent='MERCADO FECHADO'
  }
}

async function api(url){
  let r=await fetch(url,{headers:H})
  if(!r.ok)throw new Error(r.status)
  return r.json()
}
async function load(){
  document.getElementById('loading').style.display='flex'
  document.getElementById('feed').innerHTML=''
  try{
    let quotes=await api(REST+'/b3_cotacoes_aovivo?select=codigo_instrumento,preco_ultimo_negocio,volume_total,fechamento_anterior,variacao,tipo,atualizado_em,data_referencia,horario_ultima_transacao&tipo=not.is.null&order=data_referencia.desc&limit=1000')
    allItems=[]
    for(let r of quotes||[]){
      let tick=r.codigo_instrumento
      if(!tick)continue
      let tipo=r.tipo||''
      varia=r.variacao!=null?parseFloat(r.variacao):null
      if(varia==null||isNaN(varia))continue
      allItems.push({
        ticker:tick,
        preco:r.preco_ultimo_negocio!=null?parseFloat(r.preco_ultimo_negocio):null,
        variacao:varia,
        volume:r.volume_total!=null?parseFloat(r.volume_total):0,
        fechamento:r.fechamento_anterior!=null?parseFloat(r.fechamento_anterior):null,
        tipo:tipo,
        data:r.data_referencia,
        hora:r.horario_ultima_transacao||''
      })
    }
    document.getElementById('loading').style.display='none'
    render()
    updateMarketStatus()
    setupAutoRefresh()
    setInterval(updateMarketStatus,60000)
  }catch(e){
    document.getElementById('loading').innerHTML='<i class="fas fa-exclamation-triangle" style="font-size:28px;opacity:.4;margin-bottom:8px"></i><br>Erro: '+e.message+'<br><button onclick="load()" style="margin-top:12px;background:var(--accent);color:#000;border:none;padding:8px 20px;border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit">Tentar novamente</button>'
  }
}
async function refresh(){
  try{
    let quotes=await api(REST+'/b3_cotacoes_aovivo?select=codigo_instrumento,preco_ultimo_negocio,volume_total,fechamento_anterior,variacao,tipo,atualizado_em,data_referencia,horario_ultima_transacao&tipo=not.is.null&order=data_referencia.desc&limit=1000')
    allItems=[]
    for(let r of quotes||[]){
      let tick=r.codigo_instrumento
      if(!tick)continue
      let tipo=r.tipo||''
      varia=r.variacao!=null?parseFloat(r.variacao):null
      if(varia==null||isNaN(varia))continue
      allItems.push({
        ticker:tick,
        preco:r.preco_ultimo_negocio!=null?parseFloat(r.preco_ultimo_negocio):null,
        variacao:varia,
        volume:r.volume_total!=null?parseFloat(r.volume_total):0,
        fechamento:r.fechamento_anterior!=null?parseFloat(r.fechamento_anterior):null,
        tipo:tipo,
        data:r.data_referencia,
        hora:r.horario_ultima_transacao||''
      })
    }
    render(true)
  }catch(e){/*silent*/}
}
let _refreshTimer=null
function setupAutoRefresh(){
  clearInterval(_refreshTimer)
  let now=new Date()
  let br=new Date(now.toLocaleString('en-US',{timeZone:'America/Sao_Paulo'}))
  let h=br.getHours(),m=br.getMinutes(),d=br.getDay()
  let mins=h*60+m
  let open=d>=1&&d<=5&&mins>=600&&mins<1020
  if(open)_refreshTimer=setInterval(refresh,60000)
}

function setMode(el){
  if(el.classList.contains('active'))return
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'))
  el.classList.add('active')
  mode=el.dataset.mode
  document.body.classList.remove('mode-volume','mode-treemap')
  if(mode==='volume')document.body.classList.add('mode-volume')
  if(mode==='treemap')document.body.classList.add('mode-treemap')
  render()
}

function toggleAsset(el){
  let key=el.dataset.asset
  assetFilter[key]=!assetFilter[key]
  el.classList.toggle('active')
  let anyOn=Object.values(assetFilter).some(v=>v)
  if(!anyOn){assetFilter[key]=true;el.classList.add('active')}
  render()
}

function onSearch(){
  let q=document.getElementById('search').value.trim()
  document.getElementById('searchBox').classList.toggle('has-text',q.length>0)
  searchTerm=q.toUpperCase()
  render()
}
function clearSearch(){
  document.getElementById('search').value=''
  document.getElementById('searchBox').classList.remove('has-text')
  searchTerm=''
  render()
  document.getElementById('search').focus()
}

function render(isRefresh){
  let items=[...allItems]
  items=items.filter(it=>{
    let cat=ASSET_MAP[it.tipo]
    return cat?assetFilter[cat]:false
  })

  if(mode==='altas')items.sort((a,b)=>b.variacao-a.variacao)
  else if(mode==='baixas')items.sort((a,b)=>a.variacao-b.variacao)
  else items.sort((a,b)=>b.volume-a.volume)

  if(mode!=='volume')items=items.filter(it=>it.variacao!==0)

  let ranked=searchTerm?items.filter(it=>it.ticker.includes(searchTerm)):items

  let top=ranked.slice(0,100)

  let feed=document.getElementById('feed')
  if(!top.length){
    feed.innerHTML='<div class="empty-state"><i class="fas fa-inbox"></i><br>Nenhum fundo encontrado.</div>'
    return
  }

  let oldTops={}
  if(isRefresh){
    document.querySelectorAll('.rank-card').forEach(el=>{
      let t=el.dataset.ticker
      if(t)oldTops[t]=el.getBoundingClientRect().top
    })
  }

  let html=''
  for(let i=0;i<top.length;i++){
    let it=top[i]
    let pos=searchTerm?items.indexOf(it)+1:i+1
    let isUp=it.variacao>=0
    let cls=isUp?'up':'down'
    let tipoLabel=it.tipo||''

    html+='<div class="rank-card '+cls+'" data-ticker="'+it.ticker+'" style="animation'+(isRefresh?':none':':cardIn .45s ease-out both;animation-delay:'+(i*0.025)+'s')+'">'
    html+='<div class="rank-pos">'+pos+'</div>'
    html+='<div class="rank-body">'
    html+='<div class="rank-ticker">'+it.ticker+'</div>'
    if(tipoLabel&&tipoLabel!=='Ação')html+='<span class="rank-seg">'+tipoLabel+'</span>'
    html+='<div class="rank-meta">'+fmtDateTime(it.data,it.hora)+'</div>'
    html+='</div>'
    if(it.preco!=null)html+='<div class="rank-price">R$ '+fmtShort(it.preco)+'</div>'
    html+='<div class="rank-variacao"><span class="pct '+cls+'">'+(isUp?'+':'')+fmtNum(it.variacao)+'%</span></div>'
    html+='<div class="rank-volume"><span class="vol-num">'+fmtVolume(it.volume)+'</span></div>'
    html+='</div>'
  }
  feed.innerHTML=html

  if(isRefresh){
    requestAnimationFrame(()=>{
      document.querySelectorAll('.rank-card').forEach(el=>{
        let t=el.dataset.ticker
        if(t&&oldTops[t]!==undefined){
          let newTop=el.getBoundingClientRect().top
          let diff=oldTops[t]-newTop
          if(Math.abs(diff)>1){
            el.style.transition='none'
            el.style.transform='translateY('+(-diff)+'px)'
            requestAnimationFrame(()=>{
              requestAnimationFrame(()=>{
                el.style.transition='transform .6s cubic-bezier(.34,1.56,.64,1)'
                el.style.transform=''
              })
            })
          }
        }
      })
    })
  }
}

// ─── Treemap (D3.js) ───
function renderTreemap(items, topN){
  var el=document.getElementById('treemap')
  var data=items.slice(0,topN||80)
  if(!data.length){el.innerHTML='<div class="tm-empty"><i class="fas fa-inbox" style="font-size:28px;opacity:.3"></i>Nenhum dado disponível</div>';return}
  var w=el.clientWidth||800,h=Math.max(400,Math.min(600,window.innerHeight*0.6))
  el.style.height=h+'px'
  // Build hierarchical data
  var rootData={name:'root',children:[]}
  var groups={}
  data.forEach(function(d){
    var cat=ASSET_MAP[d.tipo]||'fii'
    if(!groups[cat]){groups[cat]={name:cat,children:[]};rootData.children.push(groups[cat])}
    groups[cat].children.push({name:d.ticker,value:Math.max(d.volume||1,1),item:d})
  })
  // D3 treemap
  var root=d3.hierarchy(rootData).sum(function(d){return d.value})
  d3.treemap().size([w,h]).paddingOuter(3).paddingTop(16).paddingInner(1).round(true)(root)
  // Color scale
  var colorScale=d3.scaleLinear().domain([-5,0,5]).range(['#ff4757','#232830','#00c896']).clamp(true)
  // Draw
  var svg=d3.select(el).selectAll('svg').data([null]).join('svg').attr('width',w).attr('height',h)
  var leaf=svg.selectAll('g').data(root.leaves()).join('g').attr('class','tm-tile').attr('transform',function(d){return 'translate('+d.x0+','+d.y0+')'}).on('click',function(ev,d){window.top.location.href='?p=analise-fii'})
  leaf.append('rect').attr('width',function(d){return d.x1-d.x0}).attr('height',function(d){return d.y1-d.y0}).attr('fill',function(d){return colorScale(d.data.item?d.data.item.variacao:0)}).attr('rx',3).attr('ry',3)
  // Labels
  leaf.append('text').attr('x',function(d){return(d.x1-d.x0)/2}).attr('y',function(d){return(d.y1-d.y0)/2-4}).attr('text-anchor','middle').attr('fill','#fff').attr('font-size',function(d){return Math.min((d.x1-d.x0)/6,16)}).attr('font-weight','700').style('text-shadow','0 1px 3px rgba(0,0,0,0.5)').text(function(d){return(d.x1-d.x0)>40&&(d.y1-d.y0)>28?d.data.name:''}).style('pointer-events','none')
  leaf.append('text').attr('x',function(d){return(d.x1-d.x0)/2}).attr('y',function(d){return(d.y1-d.y0)/2+8}).attr('text-anchor','middle').attr('fill','rgba(255,255,255,0.8)').attr('font-size',function(d){return Math.min((d.x1-d.x0)/8,11)}).text(function(d){
    if((d.x1-d.x0)<45||(d.y1-d.y0)<32)return ''
    var it=d.data.item;return it?'R$ '+fmtShort(it.preco):''
  }).style('pointer-events','none')
  // Category labels
  var seen={}
  root.leaves().forEach(function(d){
    var cat=d.parent.data.name
    if(!seen[cat]&&d.y1-d.y0>18){
      seen[cat]=true
      svg.append('text').attr('x',d.x0+4).attr('y',d.y0+12).attr('fill','rgba(255,255,255,0.5)').attr('font-size','10px').attr('font-weight','600').text(cat.toUpperCase()).style('pointer-events','none')
    }
  })
}

// Patch render for treemap mode
var _origRender=render
render=function(isRefresh){
  _origRender(isRefresh)
  if(mode==='treemap'){
    var items=[...allItems]
    items=items.filter(function(it){
      var cat=ASSET_MAP[it.tipo]
      return cat?assetFilter[cat]:false
    })
    if(searchTerm)items=items.filter(function(it){return it.ticker.includes(searchTerm)})
    items.sort(function(a,b){return b.volume-a.volume})
    renderTreemap(items)
  }
}

window.onload=load
