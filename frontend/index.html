<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invest Ranking</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#111318;--surface:#1a1d24;--surface2:#1f232b;--border:#2a2e36;
  --text:#e2e5e9;--text-muted:#8a909a;--heading:#eef0f3;
  --accent:#ffde59;--accent-rgb:255,222,89;--accent-bg:rgba(255,222,89,0.08);--red:#ff4757;
  --sidebar-w:260px;
  --font:'Segoe UI',system-ui,-apple-system,sans-serif;
  --shadow:0 1px 3px rgba(0,0,0,0.3);--radius:12px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;overflow:hidden}
#topbar{position:fixed;top:0;left:0;right:0;height:44px;z-index:1001;display:flex;align-items:center;gap:6px;padding:0;pointer-events:none}
#menuBtn{width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:none;border:none;color:var(--accent);font-size:18px;cursor:pointer;border-radius:0;transition:all .15s;-webkit-tap-highlight-color:transparent;flex-shrink:0;pointer-events:auto;line-height:1}
#menuBtn:hover{background:rgba(255,255,255,0.06)}
#sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);z-index:2000;transform:translateX(-100%);transition:transform .2s ease;display:flex;flex-direction:column}
#sidebar.open{transform:translateX(0)}
#sidebar .brand{padding:14px 16px;display:flex;align-items:center;gap:10px;min-height:44px;border-bottom:1px solid var(--border)}
#sidebar .brand .logo{font-size:15px;font-weight:700;color:var(--accent);white-space:nowrap}
#sidebar .brand .logo span{color:var(--text);font-weight:400}
#sidebar .close{position:absolute;top:0;right:0;background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;padding:12px 16px;border-radius:0;z-index:1}
#sidebar .close:hover{color:var(--text)}
#sidebar .scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 0}
#sidebar .scroll::-webkit-scrollbar{width:4px}
#sidebar .scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
#sidebar .nav-label{padding:16px 16px 4px;font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted);font-weight:600}
#sidebar .nav-item{display:flex;align-items:center;gap:12px;padding:11px 16px;color:var(--text-muted);text-decoration:none;font-size:13px;cursor:pointer;border-left:3px solid transparent;transition:all .12s;white-space:nowrap;min-height:44px;border-radius:0 6px 6px 0;margin:0 8px}
#sidebar .nav-item:hover{background:rgba(255,255,255,0.04);color:var(--text)}
#sidebar .nav-item.active{background:var(--accent-bg);border-left-color:var(--accent);color:var(--accent)}
#sidebar .nav-item .icon{font-size:16px;width:22px;text-align:center;flex-shrink:0;opacity:.85}
#sidebar .nav-divider{height:1px;background:var(--border);margin:8px 16px}
#main{position:fixed;top:0;left:0;right:0;bottom:0;-webkit-overflow-scrolling:touch}
#main iframe{width:100%;height:100%;border:none;display:block}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1999;display:none}
#overlay.show{display:block}

</style>
</head>
<body>

<div id="topbar">
  <button id="menuBtn" onclick="toggleMenu()" title="Menu"><i class="fas fa-bars"></i></button>
</div>

<nav id="sidebar">
  <div class="brand">
    <span class="logo">Invest<span> Ranking</span></span>
    <button class="close" onclick="closeMenu()"><i class="fas fa-times"></i></button>
  </div>
  <div class="scroll">
    <div class="nav-label">Conta</div>
    <a class="nav-item" href="pages/login.html" onclick="abrir('login',this);return false"><i class="fas fa-sign-in-alt icon"></i><span class="txt">Entrar</span></a>
    <a class="nav-item" id="navMeusAtivos" href="pages/meus-ativos.html" onclick="abrir('meus-ativos',this);return false" style="display:none"><i class="fas fa-briefcase icon"></i><span class="txt">Meus Ativos</span></a>
    <a class="nav-item" id="navMinhaConta" href="pages/minha-conta.html" onclick="abrir('minha-conta',this);return false" style="display:none"><i class="fas fa-user icon"></i><span class="txt">Minha Conta</span></a>
    <a class="nav-item" id="navLogout" href="#" onclick="return false" style="display:none"><i class="fas fa-sign-out-alt icon"></i><span class="txt" id="navUser">Sair</span></a>
    <div class="nav-divider"></div>
    <div class="nav-label">Ferramentas</div>
    <a class="nav-item" href="pages/ranking-fiis.html" onclick="abrir('ranking-fiis',this);return false"><i class="fas fa-trophy icon"></i><span class="txt">Ranking FIIs</span></a>
    <a class="nav-item" href="pages/radar-mais.html" onclick="abrir('radar-mais',this);return false"><i class="fas fa-bullseye icon"></i><span class="txt">Anúncios</span></a>
    <a class="nav-item" href="pages/analise-fii.html" onclick="abrir('analise-fii',this);return false"><i class="fas fa-chart-line icon"></i><span class="txt">Scanner</span></a>
    <a class="nav-item" href="pages/ranking.html" onclick="abrir('ranking',this);return false"><i class="fas fa-chart-simple icon"></i><span class="txt">Cotações</span></a>
    <div class="nav-divider"></div>
    <a class="nav-item" href="pages/status.html" onclick="abrir('status',this);return false"><i class="fas fa-sync-alt icon"></i><span class="txt">Status</span></a>
  </div>
</nav>

<div id="overlay" onclick="closeMenu()"></div>

<main id="main">
  <iframe id="contentFrame" src="pages/mosaico.html?v=2"></iframe>
</main>

<script>
function toggleMenu(){
  let s=document.getElementById('sidebar'),o=document.getElementById('overlay')
  let open=s.classList.toggle('open')
  o.classList.toggle('show',open)
}

function closeMenu(){
  document.getElementById('sidebar').classList.remove('open')
  document.getElementById('overlay').classList.remove('show')
}

function abrir(pagina, el){
  document.querySelectorAll('.nav-item').forEach(a => a.classList.remove('active'))
  if (el) el.classList.add('active')
  closeMenu()
  let cache='?v='+Date.now()
  // Protected pages: check auth before opening
  if(['minha-conta','meus-ativos'].includes(pagina)&&!_irAuth())
    {pagina='login';cache=''}
  document.getElementById('contentFrame').src='pages/'+pagina+'.html'+cache
  history.replaceState(null, '', '?p=' + pagina)
}

// --- Page restoration from query string ---
function initFromQuery(){
  let params = new URLSearchParams(location.search)
  let pagina = params.get('p') || 'mosaico'
  let el = document.querySelector(`.nav-item[href="pages/${pagina}.html"]`)
  abrir(pagina, el)
}
window.addEventListener('popstate', initFromQuery)
document.addEventListener('DOMContentLoaded', initFromQuery)
</script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script>
function _irAuth(){
  try{const d=JSON.parse(localStorage.getItem('ir_auth'));if(d&&d.access_token&&(!d.expires_at||d.expires_at*1000>Date.now()))return d}catch(e){}
  return null
}

function atualizarSidebar(){
  const token=_irAuth()
  if(token){
    document.querySelector('a[href="pages/login.html"]').style.display='none'
    document.getElementById('navMeusAtivos').style.display=''
    document.getElementById('navMinhaConta').style.display=''
    const lo=document.getElementById('navLogout');lo.style.display='';lo.onclick=async()=>{try{await signOut()}catch(e){}window.top.location.href='/'}
    document.getElementById('navUser').textContent='Sair';document.getElementById('navUser').style.color='var(--red)'
  }else{
    document.querySelector('a[href="pages/login.html"]').style.display=''
    document.getElementById('navMeusAtivos').style.display='none'
    document.getElementById('navMinhaConta').style.display='none'
    document.getElementById('navLogout').style.display='none'
  }
}
// Check on load
atualizarSidebar()
// Check periodically (for cross-tab and iframe sync)
setInterval(atualizarSidebar,3000)
</script>
</body>
</html>
